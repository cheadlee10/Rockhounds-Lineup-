<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ---------- constants ----------
// CF removed from active play; kept in display/stat maps so old saved games still render
const POSITIONS = ["P", "C", "1B", "2B", "3B", "SS", "LF", "LC", "RC", "RF"];
const DISPLAY_ORDER = ["P", "C", "1B", "2B", "3B", "SS", "LF", "LC", "CF", "RC", "RF"];
const OF = new Set(["LF", "LC", "CF", "RC", "RF"]);
const FILL_PRIORITY = ["P", "C", "1B", "2B", "3B", "SS", "LF", "RF", "LC", "RC"];
const POS_LABELS = {
  P: "Pitcher", C: "Catcher", "1B": "1st Base", "2B": "2nd Base", "3B": "3rd Base",
  SS: "Shortstop", LF: "Left Field", LC: "Left Center", CF: "Center Field",
  RC: "Right Center", RF: "Right Field",
};
const KEY = "rockhounds-lineup-v1";
const SEASON_GAMES = 10;
const GH_API = "https://api.github.com/repos/cheadlee10/Rockhounds-Lineup-/contents/data.json";
let _pushTimer = null;
let _dataSha = null;
let _wakeLock = null;
let _walkupTimer = null;
const DEFAULT_ROSTER = [
  "Theo", "Chase", "Wallace", "Dylan", "Parker", "Dominic", "Avery",
  "Jack", "James", "Lucian", "Emmett", "Griffin", "Miles", "Nolan",
].map((name, i) => ({ id: "seed" + (i + 1), name }));

// field diagram coordinates (viewBox 0 0 100 74)
const FIELD_XY = {
  P: [50, 49], C: [50, 68], "1B": [77, 44], "2B": [64, 30], SS: [36, 30], "3B": [23, 44],
  LF: [12, 18], LC: [37, 7], CF: [50, 6], RC: [63, 7], RF: [88, 18],
};

// scorebook palette
const C = {
  bg: "#F6F2E4",
  card: "#FDFAF0",
  ink: "#182119",
  faint: "#6E7A68",
  line: "#DDD5BC",
  green: "#1E5136",
  deep: "#14301F",
  out: "#A93B26",
  clay: "#B4602F",
  gold: "#D9A03E",
  goldSoft: "#F6E9C6",
  benchBg: "#ECE7D3",
  chalk: "#FBF6E8",
};
const CARD = {
  background: C.card,
  border: `1px solid ${C.line}`,
  boxShadow: "0 1px 2px rgba(24,33,25,.05), 0 5px 14px rgba(24,33,25,.06)",
};

// ---------- helpers ----------
function migrateGame(g) {
  const m = { ...g };
  if (!m.availByInning) m.availByInning = Array.from({ length: 6 }, () => [...(m.attend || [])]);
  if (!m.pins) m.pins = [{}, {}, {}, {}, {}, {}];
  if (!m.nextUp) m.nextUp = (m.batting && m.batting[0]) || null;
  return m;
}

// ---------- merge two data blobs (multi-device safe) ----------
function mergeData(a, b) {
  const A = a || {};
  const B = b || {};
  const newer = (A.updatedAt || 0) >= (B.updatedAt || 0) ? A : B;
  const roster =
    (newer.roster && newer.roster.length && newer.roster) ||
    (A.roster && A.roster.length && A.roster) ||
    B.roster ||
    [];
  const sig = (g) => JSON.stringify([g.attend, g.innings, g.batting]);
  const ordered = [...((newer === A ? A : B).games || []), ...((newer === A ? B : A).games || [])];
  const out = [];
  for (const g of ordered) {
    if (out.some((x) => sig(x) === sig(g))) continue; // same game on both devices
    let gg = { ...g };
    while (out.some((x) => x.num === gg.num)) gg = { ...gg, num: gg.num + 1 }; // different game, same number
    out.push(gg);
  }
  out.sort((x, y) => x.num - y.num);
  return { roster, games: out.map(migrateGame), updatedAt: Date.now() };
}

// ---------- season stats from saved games ----------
function computeStats(games) {
  const s = {};
  const ensure = (id) =>
    (s[id] ||= { gp: 0, sits: 0, dbl: 0, inf: 0, of: 0, pos: {} });
  for (const raw of games) {
    const g = migrateGame(raw);
    const gameSits = {};
    for (const id of g.attend) {
      ensure(id).gp += 1;
      gameSits[id] = 0;
    }
    g.innings.forEach((inn, i) => {
      const playing = new Set(Object.values(inn).filter(Boolean));
      for (const [pos, id] of Object.entries(inn)) {
        if (!id) continue;
        const st = ensure(id);
        st.pos[pos] = (st.pos[pos] || 0) + 1;
        if (OF.has(pos)) st.of += 1;
        else st.inf += 1;
      }
      for (const id of g.availByInning[i] || [])
        if (!playing.has(id)) {
          ensure(id).sits += 1;
          gameSits[id] = (gameSits[id] || 0) + 1;
        }
    });
    for (const id of g.attend) if ((gameSits[id] || 0) >= 2) ensure(id).dbl += 1;
  }
  return s;
}

// ---------- lineup builder ----------
// Rebuilds innings from startIdx onward. Innings before startIdx are kept
// exactly as-is (played innings stay locked). Honors pins and per-inning
// availability. Rules: no outfield twice in a row (bench resets it), never
// sit back-to-back, everyone sits once before anyone sits twice, then lowest
// season sit load, then position variety in-game and across the season.
function buildInnings(game, startIdx, otherGames) {
  const stats = computeStats(otherGames);
  const innings = game.innings.slice(0, startIdx);
  const sitsGame = {};
  const gamePos = {};
  const touch = (id) => {
    if (!(id in sitsGame)) sitsGame[id] = 0;
    if (!(id in gamePos)) gamePos[id] = {};
  };
  let last = {}; // id -> position code or "SIT"

  // replay frozen innings to rebuild fairness state
  for (let i = 0; i < startIdx; i++) {
    const inn = innings[i] || {};
    const playing = new Set(Object.values(inn).filter(Boolean));
    const next = {};
    for (const [p, id] of Object.entries(inn)) {
      if (!id) continue;
      touch(id);
      gamePos[id][p] = (gamePos[id][p] || 0) + 1;
      next[id] = p;
    }
    for (const id of game.availByInning[i] || [])
      if (!playing.has(id)) {
        touch(id);
        sitsGame[id] += 1;
        next[id] = "SIT";
      }
    last = next;
  }

  for (let i = startIdx; i < 6; i++) {
    const avail = game.availByInning[i] || [];
    avail.forEach(touch);
    const n = avail.length;
    const posList = n >= POSITIONS.length ? POSITIONS : FILL_PRIORITY.slice(0, Math.max(n, 0));
    const jit = Object.fromEntries(avail.map((id) => [id, Math.random()]));

    const assign = {};
    const used = new Set();

    // pinned assignments first — they survive every rebuild
    const pinsI = (game.pins && game.pins[i]) || {};
    for (const [p, id] of Object.entries(pinsI)) {
      if (posList.includes(p) && avail.includes(id) && !used.has(id) && !(p in assign)) {
        assign[p] = id;
        used.add(id);
      }
    }

    // pick sitters
    const sitCount = Math.max(0, n - posList.length);
    let sitters = [];
    if (sitCount > 0) {
      const cands = avail.filter((id) => !used.has(id));
      const ranked = [...cands].sort(
        (a, b) =>
          ((last[a] === "SIT" ? 1 : 0) - (last[b] === "SIT" ? 1 : 0)) ||
          (sitsGame[a] - sitsGame[b]) ||
          ((stats[a]?.sits || 0) + (stats[a]?.dbl || 0) -
            ((stats[b]?.sits || 0) + (stats[b]?.dbl || 0))) ||
          (jit[a] - jit[b])
      );
      const nonConsec = ranked.filter((id) => last[id] !== "SIT");
      sitters = (nonConsec.length >= sitCount ? nonConsec : ranked).slice(0, sitCount);
    }
    const sitSet = new Set(sitters);
    const playing = avail.filter((id) => !sitSet.has(id) && !used.has(id));

    const score = (id, pos) =>
      (gamePos[id][pos] || 0) * 1000 +
      (stats[id]?.pos?.[pos] || 0) * 10 +
      (OF.has(pos) && last[id] && last[id] !== "SIT" && !OF.has(last[id]) ? -8 : 0) +
      jit[id];

    const ifSpots = posList.filter((p) => !OF.has(p));

    // kids who played outfield last inning must go infield this inning
    const restricted = playing.filter((id) => OF.has(last[id]));
    for (const kid of restricted) {
      const open = ifSpots.filter((p) => !(p in assign));
      const pool = open.length ? open : posList.filter((p) => !(p in assign));
      if (!pool.length) break;
      const best = [...pool].sort((a, b) => score(kid, a) - score(kid, b))[0];
      assign[best] = kid;
      used.add(kid);
    }
    for (const p of posList) {
      if (p in assign) continue;
      const cands = playing.filter((id) => !used.has(id));
      if (!cands.length) break;
      const best = [...cands].sort((a, b) => score(a, p) - score(b, p))[0];
      assign[p] = best;
      used.add(best);
    }

    const next = {};
    for (const id of sitters) {
      next[id] = "SIT";
      sitsGame[id] += 1;
    }
    for (const [p, id] of Object.entries(assign)) {
      next[id] = p;
      gamePos[id][p] = (gamePos[id][p] || 0) + 1;
    }
    last = next;
    innings.push(assign);
  }
  return innings;
}

function newGame(attendIds, gameNum, roster, otherGames) {
  const g = {
    num: gameNum,
    date: new Date().toISOString().slice(0, 10),
    attend: [...attendIds],
    availByInning: Array.from({ length: 6 }, () => [...attendIds]),
    pins: [{}, {}, {}, {}, {}, {}],
    innings: [],
    batting: [],
    nextUp: null,
  };
  g.innings = buildInnings(g, 0, otherGames);
  // batting: season rotation (shift 3 per game), inning-1 sitters float to the top
  const ids = roster.map((r) => r.id);
  const shift = ids.length ? ((gameNum - 1) * 3) % ids.length : 0;
  const rot = [...ids.slice(shift), ...ids.slice(0, shift)].filter((id) => attendIds.includes(id));
  const playing1 = new Set(Object.values(g.innings[0] || {}).filter(Boolean));
  g.batting = [...rot.filter((id) => !playing1.has(id)), ...rot.filter((id) => playing1.has(id))];
  g.nextUp = g.batting[0] || null;
  return g;
}

// ---------- app ----------
function RockhoundsLineup() {
  const [loaded, setLoaded] = useState(false);
  const [roster, setRoster] = useState([]);
  const [games, setGames] = useState([]);
  const [view, setView] = useState("game"); // game | roster | stats
  const [phase, setPhase] = useState("list"); // list | att | lineup
  const [outIds, setOutIds] = useState([]);
  const [attNum, setAttNum] = useState(1);
  const [draft, setDraft] = useState(null);
  const [curInning, setCurInning] = useState(0);
  const [sel, setSel] = useState(null); // swap selection {id, pos|null}
  const [bulk, setBulk] = useState("");
  const [armDelete, setArmDelete] = useState(null);
  const [expanded, setExpanded] = useState(null);
  const [managing, setManaging] = useState(false);
  const [gameMode, setGameMode] = useState(false);
  const [restoreMsg, setRestoreMsg] = useState("");
  const [token, setToken] = useState("");
  const [tokenDraft, setTokenDraft] = useState("");
  const [syncMsg, setSyncMsg] = useState("");
  const [walkup, setWalkup] = useState(null);
  const [soundOn, setSoundOn] = useState(true);
  const [copied, setCopied] = useState(false);

  useEffect(() => {
    const tok = (() => {
      try { return localStorage.getItem(KEY + ":ghtoken") || ""; } catch (e) { return ""; }
    })();
    setToken(tok);
    setTokenDraft(tok);
    let local = null;
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) local = JSON.parse(raw);
    } catch (e) {
      // first run — nothing saved yet
    }
    let found = false;
    if (local && Array.isArray(local.roster) && local.roster.length) {
      setRoster(local.roster);
      found = true;
    }
    if (local && Array.isArray(local.games)) setGames(local.games.map(migrateGame));
    if (!found) setRoster(DEFAULT_ROSTER);
    setLoaded(true);
    // then check the cloud — merge, never overwrite
    (async () => {
      const cloud = await cloudPull(tok);
      if (cloud === "ERR") return;
      if (cloud && Array.isArray(cloud.roster)) {
        const merged = mergeData(cloud, local || {});
        setRoster(merged.roster);
        setGames(merged.games);
        try { localStorage.setItem(KEY, JSON.stringify(merged)); } catch (e) {}
        if (tok && JSON.stringify(merged.games) !== JSON.stringify((cloud.games || []).map(migrateGame))) {
          cloudPush(tok, merged); // this device had games the cloud didn't
        } else {
          setSyncMsg("in sync ✓");
        }
      } else if (tok && local && local.roster) {
        cloudPush(tok, { roster: local.roster, games: local.games || [], updatedAt: local.updatedAt || Date.now() });
      }
    })();
  }, []);

  const persist = (r, g) => {
    const stamped = { roster: r, games: g, updatedAt: Date.now() };
    try {
      localStorage.setItem(KEY, JSON.stringify(stamped));
    } catch (e) {
      console.error("save failed", e);
    }
    schedulePush(stamped);
  };

  // ---------- cloud sync (GitHub) ----------
  const utf8b64 = (s) => btoa(unescape(encodeURIComponent(s)));
  const b64utf8 = (s) => decodeURIComponent(escape(atob(s)));

  const cloudPull = async (tok) => {
    try {
      const headers = { Accept: "application/vnd.github+json" };
      if (tok) headers.Authorization = "Bearer " + tok;
      const res = await fetch(GH_API + "?ref=main&cb=" + Date.now(), { headers });
      if (res.status === 404) {
        _dataSha = null;
        return null; // no data.json yet
      }
      if (!res.ok) throw new Error("HTTP " + res.status);
      const j = await res.json();
      _dataSha = j.sha;
      return JSON.parse(b64utf8((j.content || "").replace(/\n/g, "")));
    } catch (e) {
      return "ERR";
    }
  };

  const cloudPush = async (tok, payload, retry = true) => {
    if (!tok) return;
    setSyncMsg("syncing…");
    try {
      const body = {
        message: "lineup sync " + new Date().toISOString(),
        content: utf8b64(JSON.stringify(payload)),
      };
      if (_dataSha) body.sha = _dataSha;
      const res = await fetch(GH_API, {
        method: "PUT",
        headers: {
          Authorization: "Bearer " + tok,
          Accept: "application/vnd.github+json",
          "Content-Type": "application/json",
        },
        body: JSON.stringify(body),
      });
      if ((res.status === 409 || res.status === 422) && retry) {
        await cloudPull(tok); // refresh sha and try once more
        return cloudPush(tok, payload, false);
      }
      if (!res.ok) throw new Error("HTTP " + res.status);
      const j = await res.json();
      _dataSha = (j.content && j.content.sha) || _dataSha;
      setSyncMsg("synced ✓ " + new Date().toLocaleTimeString([], { hour: "numeric", minute: "2-digit" }));
    } catch (e) {
      setSyncMsg("sync failed — check token & connection");
    }
  };

  const schedulePush = (stamped) => {
    if (!token) return;
    clearTimeout(_pushTimer);
    _pushTimer = setTimeout(() => cloudPush(token, stamped), 2500);
  };

  const saveToken = async (t) => {
    const v = t.trim();
    setToken(v);
    try {
      if (v) localStorage.setItem(KEY + ":ghtoken", v);
      else localStorage.removeItem(KEY + ":ghtoken");
    } catch (e) {}
    if (!v) {
      setSyncMsg("");
      return;
    }
    setSyncMsg("checking cloud…");
    const cloud = await cloudPull(v);
    if (cloud === "ERR") {
      setSyncMsg("couldn't reach cloud — check token & connection");
      return;
    }
    const merged = mergeData(cloud || {}, { roster, games, updatedAt: Date.now() });
    setRoster(merged.roster);
    setGames(merged.games);
    try { localStorage.setItem(KEY, JSON.stringify(merged)); } catch (e) {}
    cloudPush(v, merged);
  };

  // every game change autosaves — no Save button to forget mid-game
  const commit = (g) => {
    const next = [...games.filter((x) => x.num !== g.num), g].sort((a, b) => a.num - b.num);
    setGames(next);
    setDraft(g);
    persist(roster, next);
  };

  const nameOf = (id) => roster.find((r) => r.id === id)?.name || "—";
  const stats = computeStats(games);

  // ---------- roster actions ----------
  const addBulk = () => {
    const names = bulk.split("\n").map((s) => s.trim()).filter(Boolean);
    if (!names.length) return;
    const next = [
      ...roster,
      ...names.map((name, i) => ({ id: "k" + Date.now() + "_" + i, name })),
    ];
    setRoster(next);
    setBulk("");
    persist(next, games);
  };
  const renameKid = (id, name) => {
    const next = roster.map((r) => (r.id === id ? { ...r, name } : r));
    setRoster(next);
    persist(next, games);
  };
  const removeKid = (id) => {
    const next = roster.filter((r) => r.id !== id);
    setRoster(next);
    persist(next, games);
  };

  // ---------- game actions ----------
  const startNew = () => {
    const nums = games.map((g) => g.num);
    setAttNum(nums.length ? Math.max(...nums) + 1 : 1);
    setOutIds([]);
    setPhase("att");
  };
  const editAttendance = () => {
    if (!draft) return;
    setAttNum(draft.num);
    setOutIds(roster.map((r) => r.id).filter((id) => !draft.attend.includes(id)));
    setPhase("att");
  };
  const runGenerate = () => {
    const attend = roster.map((r) => r.id).filter((id) => !outIds.includes(id));
    if (attend.length < 2) return;
    const others = games.filter((g) => g.num !== attNum);
    const g = newGame(attend, attNum, roster, others);
    commit(g);
    setCurInning(0);
    setSel(null);
    setManaging(false);
    setPhase("lineup");
  };
  const reshuffle = () => {
    if (!draft) return;
    const others = games.filter((g) => g.num !== draft.num);
    const g = { ...draft, innings: buildInnings(draft, curInning, others) };
    commit(g);
    setSel(null);
  };
  const openGame = (raw) => {
    setDraft(migrateGame(raw));
    setCurInning(0);
    setSel(null);
    setManaging(false);
    setPhase("lineup");
  };
  const deleteGame = (num) => {
    const next = games.filter((g) => g.num !== num);
    setGames(next);
    persist(roster, next);
    setArmDelete(null);
  };

  // ---------- god mode: per-inning availability ----------
  const toggleAvail = (id) => {
    const g = {
      ...draft,
      availByInning: draft.availByInning.map((a) => [...a]),
      attend: [...draft.attend],
      batting: [...draft.batting],
    };
    const isIn = g.availByInning[curInning].includes(id);
    for (let i = curInning; i < 6; i++) {
      if (isIn) g.availByInning[i] = g.availByInning[i].filter((x) => x !== id);
      else if (!g.availByInning[i].includes(id)) g.availByInning[i].push(id);
    }
    if (!isIn) {
      if (!g.attend.includes(id)) g.attend.push(id);
      if (!g.batting.includes(id)) g.batting.push(id); // slot them where you want with the arrows
    }
    const others = games.filter((x) => x.num !== g.num);
    g.innings = buildInnings(g, curInning, others);
    commit(g);
    setSel(null);
  };

  // ---------- pins ----------
  const togglePin = (pos, id) => {
    const pins = draft.pins.map((p) => ({ ...p }));
    if (pins[curInning][pos] === id) delete pins[curInning][pos];
    else pins[curInning][pos] = id;
    commit({ ...draft, pins });
  };

  // ---------- batting order ----------
  const moveBat = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= draft.batting.length) return;
    const batting = [...draft.batting];
    [batting[i], batting[j]] = [batting[j], batting[i]];
    commit({ ...draft, batting });
  };
  const setNextUp = (id) => commit({ ...draft, nextUp: id });
  const tagFor = (i) => {
    const k = draft.batting.indexOf(draft.nextUp);
    if (k < 0) return null;
    const L = draft.batting.length;
    const d = (i - k + L) % L;
    return d === 0 ? "UP" : d === 1 ? "ON DECK" : d === 2 ? "IN HOLE" : null;
  };

  // ---------- swap ----------
  const tapRow = (id, pos) => {
    if (!draft) return;
    if (!sel) {
      setSel({ id, pos });
      return;
    }
    if (sel.id === id) {
      setSel(null);
      return;
    }
    const inn = { ...draft.innings[curInning] };
    if (sel.pos && pos) {
      inn[sel.pos] = id;
      inn[pos] = sel.id;
    } else if (sel.pos && !pos) {
      inn[sel.pos] = id; // bench kid takes the spot, sel.id goes to bench
    } else if (!sel.pos && pos) {
      inn[pos] = sel.id;
    }
    // a manual swap overrides any pin on the touched spots
    const pins = draft.pins.map((p) => ({ ...p }));
    if (sel.pos) delete pins[curInning][sel.pos];
    if (pos) delete pins[curInning][pos];
    const innings = draft.innings.map((x, i) => (i === curInning ? inn : x));
    let g = { ...draft, innings, pins };
    // if the swap changed WHO SITS this inning, the rest of the game was
    // planned around the old sitters — rebuild the remaining innings so the
    // no-consecutive-sit and outfield rules stay true
    const benchInvolved = (sel.pos && !pos) || (!sel.pos && pos);
    if (benchInvolved && curInning < 5) {
      const others = games.filter((x) => x.num !== g.num);
      g = { ...g, innings: buildInnings(g, curInning + 1, others) };
    }
    commit(g);
    setSel(null);
  };

  // ---------- derived ----------
  const benchFor = (i) => {
    if (!draft) return [];
    const playing = new Set(Object.values(draft.innings[i]).filter(Boolean));
    return (draft.availByInning[i] || []).filter((id) => !playing.has(id));
  };
  const sitsSoFar = (id, through) => {
    if (!draft) return 0;
    let c = 0;
    for (let i = 0; i <= through; i++) {
      const playing = new Set(Object.values(draft.innings[i]).filter(Boolean));
      if ((draft.availByInning[i] || []).includes(id) && !playing.has(id)) c++;
    }
    return c;
  };
  const inningPositions = (i) =>
    DISPLAY_ORDER.filter((p) => p in (draft?.innings[i] || {}));

  // ---------- live fairness audit of the open game ----------
  const auditGame = (g) => {
    const issues = [];
    const sitInn = {};
    const posInn = {};
    g.innings.forEach((inn, i) => {
      const playing = new Set(Object.values(inn).filter(Boolean));
      for (const [p, id] of Object.entries(inn)) {
        if (!id) continue;
        (posInn[id] ||= []).push([i, p]);
      }
      for (const id of g.availByInning[i] || [])
        if (!playing.has(id)) (sitInn[id] ||= []).push(i);
    });
    for (const [id, arr] of Object.entries(sitInn)) {
      for (let j = 1; j < arr.length; j++)
        if (arr[j] === arr[j - 1] + 1)
          issues.push(nameOf(id) + " sits back-to-back (inn " + (arr[j - 1] + 1) + " & " + (arr[j] + 1) + ")");
      if (arr.length > 2) issues.push(nameOf(id) + " sits " + arr.length + "× this game");
    }
    for (const [id, arr] of Object.entries(posInn)) {
      for (let j = 1; j < arr.length; j++) {
        const [i1, p1] = arr[j - 1];
        const [i2, p2] = arr[j];
        if (i2 === i1 + 1 && OF.has(p1) && OF.has(p2))
          issues.push(nameOf(id) + " outfield back-to-back (inn " + (i1 + 1) + " & " + (i2 + 1) + ")");
      }
      const seen = {};
      arr.forEach(([i, p]) => (seen[p] ||= []).push(i + 1));
      for (const [p, list] of Object.entries(seen))
        if (list.length > 1) issues.push(nameOf(id) + " plays " + p + " twice (inn " + list.join(" & ") + ")");
    }
    return issues;
  };

  // ---------- game mode fullscreen + keep screen awake ----------
  const enterGameMode = async () => {
    setGameMode(true);
    try {
      const el = document.documentElement;
      if (el.requestFullscreen) await el.requestFullscreen();
      else if (el.webkitRequestFullscreen) el.webkitRequestFullscreen();
    } catch (e) {}
    try {
      if (navigator.wakeLock) _wakeLock = await navigator.wakeLock.request("screen");
    } catch (e) {}
  };
  const exitGameMode = () => {
    setGameMode(false);
    try {
      if (_wakeLock) {
        _wakeLock.release();
        _wakeLock = null;
      }
    } catch (e) {}
    try {
      if (document.fullscreenElement && document.exitFullscreen) document.exitFullscreen();
      else if (document.webkitFullscreenElement && document.webkitExitFullscreen) document.webkitExitFullscreen();
    } catch (e) {}
  };

  // ---------- walk-up: ballpark organ "charge" + name takeover ----------
  const playCharge = () => {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const seq = [
        [392.0, 0.0, 0.12], [523.25, 0.12, 0.12], [659.25, 0.24, 0.12],
        [783.99, 0.36, 0.2], [659.25, 0.56, 0.12], [783.99, 0.68, 0.45],
      ];
      for (const [f, t, d] of seq) {
        const o = ctx.createOscillator();
        const g = ctx.createGain();
        o.type = "square";
        o.frequency.value = f;
        g.gain.setValueAtTime(0.0001, ctx.currentTime + t);
        g.gain.exponentialRampToValueAtTime(0.16, ctx.currentTime + t + 0.02);
        g.gain.exponentialRampToValueAtTime(0.0001, ctx.currentTime + t + d);
        o.connect(g);
        g.connect(ctx.destination);
        o.start(ctx.currentTime + t);
        o.stop(ctx.currentTime + t + d + 0.05);
      }
      setTimeout(() => ctx.close(), 1600);
    } catch (e) {}
  };
  const triggerWalkup = (id) => {
    if (soundOn) playCharge();
    setWalkup(id);
    clearTimeout(_walkupTimer);
    _walkupTimer = setTimeout(() => setWalkup(null), 2600);
  };
  const advanceBatter = () => {
    if (!draft || !draft.batting.length) return;
    const L = draft.batting.length;
    const k = draft.batting.indexOf(draft.nextUp);
    const next = draft.batting[((k < 0 ? 0 : k) + 1) % L];
    commit({ ...draft, nextUp: next });
    triggerWalkup(next);
  };

  // ---------- copy lineup as text ----------
  const copyLineup = async () => {
    if (!draft) return;
    const L = [];
    L.push("ROCKHOUNDS — GAME " + draft.num + " (" + draft.date + ")");
    L.push("");
    L.push("BATTING:");
    draft.batting.forEach((id, i) => L.push(i + 1 + ". " + nameOf(id)));
    for (let i = 0; i < 6; i++) {
      L.push("");
      L.push("INNING " + (i + 1) + ":");
      DISPLAY_ORDER.filter((p) => p in (draft.innings[i] || {})).forEach((p) =>
        L.push(p + ": " + nameOf(draft.innings[i][p]))
      );
      const b = benchFor(i).map(nameOf).join(", ");
      if (b) L.push("Bench: " + b);
    }
    try {
      await navigator.clipboard.writeText(L.join("\n"));
      setCopied(true);
      setTimeout(() => setCopied(false), 1500);
    } catch (e) {}
  };

  // ---------- backup / restore ----------
  const exportData = () => {
    const blob = new Blob([JSON.stringify({ roster, games }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "rockhounds-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const importData = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (!Array.isArray(d.roster) || !Array.isArray(d.games)) throw new Error("bad file");
        setRoster(d.roster);
        setGames(d.games.map(migrateGame));
        persist(d.roster, d.games);
        setRestoreMsg("Restored ✓");
      } catch (err) {
        setRestoreMsg("That file didn't work");
      }
      setTimeout(() => setRestoreMsg(""), 2500);
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  if (!loaded)
    return (
      <div style={{ background: C.bg, color: C.faint }} className="min-h-screen flex items-center justify-center font-mono text-sm">
        Loading roster…
      </div>
    );

  // ---------- shared UI bits ----------
  const TabBtn = ({ id, label }) => (
    <button
      onClick={() => setView(id)}
      className="flex-1 py-3 font-mono text-sm tracking-widest uppercase font-bold"
      style={{
        color: view === id ? C.ink : C.faint,
        borderBottom: view === id ? `3px solid ${C.gold}` : `3px solid transparent`,
        background: "transparent",
      }}
    >
      {label}
    </button>
  );

  const Btn = ({ onClick, children, kind = "solid", disabled }) => (
    <button
      onClick={onClick}
      disabled={disabled}
      className="px-4 py-3 rounded font-mono font-bold text-base uppercase tracking-wider w-full"
      style={
        kind === "solid"
          ? {
              background: disabled ? C.line : C.green,
              color: C.chalk,
              boxShadow: disabled ? "none" : "0 2px 0 rgba(20,48,31,.5), 0 8px 18px rgba(20,48,31,.18)",
            }
          : { background: C.card, color: C.green, border: `1.5px solid ${C.green}` }
      }
    >
      {children}
    </button>
  );

  // ---------- GAME MODE (iPad on the fence) ----------
  const GameModeScreen = () => {
    const inn = draft.innings[curInning] || {};
    const availNow = draft.availByInning[curInning] || [];
    return (
      <div className="fixed inset-0 z-50 flex" style={{ background: C.bg, color: C.ink }}>
        {/* batting order — left */}
        <div className="w-1/3 flex flex-col overflow-y-auto" style={{ background: C.card, borderRight: `2px solid ${C.line}` }}>
          <div className="px-4 py-3 font-mono text-lg tracking-widest font-bold" style={{ background: C.deep, color: C.gold }}>
            BATTING ORDER
          </div>
          {draft.batting.map((id, i) => {
            const tag = tagFor(i);
            const here = availNow.includes(id);
            return (
              <button
                key={id}
                onClick={() => setNextUp(id)}
                className={"flex items-center gap-3 px-4 py-2 text-left" + (tag === "UP" ? " up-pulse" : "")}
                style={{
                  borderBottom: `1px solid ${C.line}`,
                  background: tag === "UP" ? C.goldSoft : "transparent",
                  opacity: here ? 1 : 0.35,
                }}
              >
                <span className="font-mono text-2xl w-10 text-right" style={{ color: C.faint }}>
                  {i + 1}:
                </span>
                <span className="text-3xl font-bold flex-1" style={{ textDecoration: here ? "none" : "line-through" }}>
                  {nameOf(id)}
                </span>
                {tag && (
                  <span
                    className="font-mono text-sm px-2 py-1 rounded font-bold"
                    style={{
                      background: tag === "UP" ? C.gold : "transparent",
                      border: `1.5px solid ${tag === "UP" ? C.gold : C.faint}`,
                      color: tag === "UP" ? C.ink : C.faint,
                    }}
                  >
                    {tag}
                  </span>
                )}
              </button>
            );
          })}
          <div className="px-4 py-2 font-mono text-xs mt-auto" style={{ color: C.faint }}>
            Tap a name to mark who's UP
          </div>
        </div>

        {/* field — right */}
        <div className="flex-1 flex flex-col">
          <div className="flex items-center gap-2 px-4 py-2" style={{ background: C.deep, color: C.chalk }}>
            <button onClick={exitGameMode} className="font-mono text-sm px-3 py-2 rounded" style={{ border: "1.5px solid rgba(255,255,255,.5)" }}>
              ✕ EXIT
            </button>
            <div className="flex-1 flex items-center justify-center gap-1">
              <button
                onClick={() => setCurInning(Math.max(0, curInning - 1))}
                className="px-4 py-2 font-mono text-xl font-bold rounded"
                style={{ border: "1.5px solid rgba(255,255,255,.5)", opacity: curInning === 0 ? 0.3 : 1 }}
              >
                ‹
              </button>
              <div className="px-5 py-1 slab text-2xl" style={{ color: C.gold, letterSpacing: ".06em" }}>
                INNING {curInning + 1}
              </div>
              <button
                onClick={() => setCurInning(Math.min(5, curInning + 1))}
                className="px-4 py-2 font-mono text-xl font-bold rounded"
                style={{ border: "1.5px solid rgba(255,255,255,.5)", opacity: curInning === 5 ? 0.3 : 1 }}
              >
                ›
              </button>
            </div>
            <button onClick={() => setSoundOn(!soundOn)} className="font-mono text-sm px-3 py-2 rounded" style={{ border: "1.5px solid rgba(255,255,255,.5)" }}>
              {soundOn ? "🔊" : "🔇"}
            </button>
            <div className="font-mono text-sm opacity-80">GAME {draft.num}</div>
          </div>

          {/* jumbotron */}
          {(() => {
            const L = draft.batting.length;
            const k = Math.max(0, draft.batting.indexOf(draft.nextUp));
            const now = draft.batting[k];
            const deck = L > 1 ? draft.batting[(k + 1) % L] : null;
            return (
              <div className="flex items-stretch" style={{ background: C.gold, borderBottom: `3px solid ${C.deep}` }}>
                <div className="flex-1 px-4 py-2 min-w-0">
                  <div className="font-mono text-sm font-bold tracking-widest" style={{ color: C.deep, opacity: 0.7 }}>NOW BATTING</div>
                  <div className="slab text-5xl leading-none truncate" style={{ color: C.deep }}>{now ? nameOf(now) : "—"}</div>
                </div>
                {deck && (
                  <div className="px-4 py-2 text-right" style={{ borderLeft: "2px solid rgba(20,48,31,.25)" }}>
                    <div className="font-mono text-xs font-bold tracking-widest" style={{ color: C.deep, opacity: 0.7 }}>ON DECK</div>
                    <div className="text-3xl font-bold" style={{ color: C.deep }}>{nameOf(deck)}</div>
                  </div>
                )}
                <button onClick={advanceBatter} className="px-6 slab text-3xl" style={{ background: C.deep, color: C.gold }}>
                  NEXT ▶
                </button>
              </div>
            );
          })()}

          <div className="flex-1 flex items-center justify-center p-2">
            <svg viewBox="0 0 100 74" className="w-full h-full" preserveAspectRatio="xMidYMid meet">
              <defs>
                <pattern id="mow" width="16" height="74" patternUnits="userSpaceOnUse">
                  <rect width="16" height="74" fill="#2E6B4A" />
                  <rect width="8" height="74" fill="#296041" />
                </pattern>
              </defs>
              {/* outfield grass, mown stripes */}
              <rect x="0" y="0" width="100" height="74" fill="url(#mow)" rx="2" />
              {/* outfield wall */}
              <rect x="0" y="0" width="100" height="2.6" fill="#0F241A" />
              <rect x="0" y="2.6" width="100" height="0.6" fill="#D9A03E" />
              {/* warning track */}
              <rect x="1" y="1" width="98" height="72" rx="2" fill="none" stroke="#B9885C" strokeWidth="2.4" opacity="0.95" />
              {/* foul lines */}
              <line x1="50" y1="58" x2="6" y2="14" stroke="#FBF6E8" strokeWidth="0.7" opacity="0.9" />
              <line x1="50" y1="58" x2="94" y2="14" stroke="#FBF6E8" strokeWidth="0.7" opacity="0.9" />
              {/* infield */}
              <polygon points="50,64 75,39 50,14 25,39" fill="#C0854F" />
              <polygon points="50,58 69,39 50,20 31,39" fill="#37734F" />
              <polyline points="50,58 69,39 50,20 31,39 50,58" fill="none" stroke="#FBF6E8" strokeWidth="0.8" />
              {/* bases */}
              <rect x="67.6" y="37.6" width="2.8" height="2.8" fill="#FBF6E8" transform="rotate(45 69 39)" />
              <rect x="48.6" y="18.6" width="2.8" height="2.8" fill="#FBF6E8" transform="rotate(45 50 20)" />
              <rect x="29.6" y="37.6" width="2.8" height="2.8" fill="#FBF6E8" transform="rotate(45 31 39)" />
              {/* home plate + batter boxes */}
              <rect x="48.4" y="56.4" width="3.2" height="3.2" fill="#FBF6E8" transform="rotate(45 50 58)" />
              <rect x="44.6" y="55.6" width="2.6" height="4.8" fill="none" stroke="#FBF6E8" strokeWidth="0.45" />
              <rect x="52.8" y="55.6" width="2.6" height="4.8" fill="none" stroke="#FBF6E8" strokeWidth="0.45" />
              {/* mound */}
              <circle cx="50" cy="40.5" r="3.2" fill="#C0854F" />
              <rect x="48.9" y="40.2" width="2.2" height="0.7" rx="0.3" fill="#FBF6E8" />
              {/* on-deck circles */}
              <circle cx="11" cy="64" r="3" fill="#C0854F" stroke="#FBF6E8" strokeWidth="0.4" />
              <circle cx="89" cy="64" r="3" fill="#C0854F" stroke="#FBF6E8" strokeWidth="0.4" />
              {/* players */}
              {inningPositions(curInning).map((p) => {
                const id = draft.innings[curInning][p];
                const nm = nameOf(id);
                const [x, y] = FIELD_XY[p] || [50, 40];
                return (
                  <g key={p}>
                    <rect x={x - 12} y={y - 6} width="24" height="12" rx="1.6" fill="#FAFCF8" stroke={C.ink} strokeWidth="0.35" />
                    <rect x={x - 12} y={y - 6} width="24" height="4.6" rx="1.6" fill={C.green} />
                    <rect x={x - 12} y={y - 3.4} width="24" height="2" fill={C.green} />
                    <text x={x} y={y - 2.3} textAnchor="middle" fontSize="4" fontWeight="700" fill={C.chalk} fontFamily="'Barlow Condensed', sans-serif" letterSpacing="0.4">
                      {p}
                    </text>
                    <text
                      x={x}
                      y={y + 4}
                      textAnchor="middle"
                      fontSize="6"
                      fontWeight="800"
                      fill={C.ink}
                      fontFamily="'Barlow', system-ui, sans-serif"
                      {...(nm.length > 6 ? { textLength: 21.5, lengthAdjust: "spacingAndGlyphs" } : {})}
                    >
                      {nm}
                    </text>
                  </g>
                );
              })}
            </svg>
          </div>

          {/* bench strip */}
          <div className="px-4 py-3 flex items-center gap-3 flex-wrap" style={{ background: C.deep, borderTop: `3px solid ${C.gold}` }}>
            <span className="font-mono text-lg tracking-widest font-bold" style={{ color: C.gold }}>
              BENCH:
            </span>
            {benchFor(curInning).length === 0 && (
              <span className="font-mono text-sm" style={{ color: "rgba(251,246,232,.75)" }}>
                nobody — everyone's in
              </span>
            )}
            {benchFor(curInning).map((id) => (
              <span key={id} className="text-3xl font-bold px-4 py-2 rounded" style={{ background: C.chalk, border: `1px solid ${C.line}`, color: C.ink }}>
                {nameOf(id)}
                {sitsSoFar(id, curInning) >= 2 && (
                  <span className="font-mono text-xs ml-1" style={{ color: C.out }}>
                    ×{sitsSoFar(id, curInning)}
                  </span>
                )}
              </span>
            ))}
          </div>
        </div>
        {walkup && (
          <div
            onClick={() => setWalkup(null)}
            className="fixed inset-0 flex flex-col items-center justify-center gap-4"
            style={{ background: C.deep, zIndex: 60 }}
          >
            <div className="font-mono text-2xl font-bold" style={{ color: C.gold, letterSpacing: ".35em" }}>NOW BATTING</div>
            <div className="slab text-center leading-none px-4" style={{ color: C.chalk, fontSize: "min(17vw, 170px)" }}>{nameOf(walkup)}</div>
            <div className="stitch" style={{ width: "260px" }} />
          </div>
        )}
      </div>
    );
  };

  return (
    <React.Fragment>
      <style>{`
        .print-sheet { display: none; }
        @media print {
          body { background: #fff !important; }
          .no-print { display: none !important; }
          .print-sheet { display: block !important; }
        }
      `}</style>
      {draft && (
        <div
          className="print-sheet"
          style={{
            background: "#fff",
            color: "#000",
            padding: "32px",
            fontFamily: "'Barlow Condensed', sans-serif",
          }}
        >
          <div style={{ fontSize: "14px", letterSpacing: "4px", borderBottom: "3px double #A93B26", paddingBottom: "6px" }}>
            ROCKHOUNDS · GAME {draft.num} · {draft.date}
          </div>
          <div
            style={{
              fontSize: "22px",
              fontWeight: 400,
              margin: "12px 0 10px",
              fontFamily: "'Alfa Slab One', serif",
            }}
          >
            Batting Order
          </div>
          <div style={{ columnCount: 2, columnGap: "36px" }}>
            {draft.batting.map((id, i) => (
              <div
                key={id}
                style={{
                  display: "flex",
                  gap: "10px",
                  fontSize: "15px",
                  padding: "3px 0",
                  borderBottom: "1px solid #ccc",
                  breakInside: "avoid",
                }}
              >
                <span style={{ width: "26px", textAlign: "right" }}>{i + 1}:</span>
                <span style={{ fontFamily: "'Barlow', system-ui, sans-serif", fontWeight: 700 }}>{nameOf(id)}</span>
              </div>
            ))}
          </div>
          <div style={{ fontSize: "22px", fontFamily: "'Alfa Slab One', serif", margin: "22px 0 10px" }}>Field Rotation</div>
          <table style={{ width: "100%", borderCollapse: "collapse", fontSize: "12.5px" }}>
            <thead>
              <tr>
                <th style={{ border: "1px solid #999", padding: "4px 6px", background: "#eee", textAlign: "left" }}>POS</th>
                {[0, 1, 2, 3, 4, 5].map((i) => (
                  <th key={i} style={{ border: "1px solid #999", padding: "4px 6px", background: "#eee" }}>INN {i + 1}</th>
                ))}
              </tr>
            </thead>
            <tbody>
              {DISPLAY_ORDER.filter((p) => draft.innings.some((inn) => p in inn)).map((p) => (
                <tr key={p}>
                  <td style={{ border: "1px solid #999", padding: "4px 6px", fontWeight: 700 }}>{p}</td>
                  {[0, 1, 2, 3, 4, 5].map((i) => (
                    <td key={i} style={{ border: "1px solid #999", padding: "4px 6px", textAlign: "center", fontFamily: "'Barlow', sans-serif" }}>
                      {draft.innings[i] && draft.innings[i][p] ? nameOf(draft.innings[i][p]) : "—"}
                    </td>
                  ))}
                </tr>
              ))}
              <tr>
                <td style={{ border: "1px solid #999", padding: "4px 6px", fontWeight: 700 }}>BENCH</td>
                {[0, 1, 2, 3, 4, 5].map((i) => (
                  <td key={i} style={{ border: "1px solid #999", padding: "4px 6px", textAlign: "center", fontSize: "11px", fontFamily: "'Barlow', sans-serif" }}>
                    {benchFor(i).map(nameOf).join(", ") || "—"}
                  </td>
                ))}
              </tr>
            </tbody>
          </table>
        </div>
      )}

      {gameMode && draft && <GameModeScreen />}

      <div style={{ color: C.ink }} className="min-h-screen pb-10 no-print">
      {/* header */}
      <div className="px-4 pt-5 pb-4 relative overflow-hidden" style={{ background: C.deep, color: C.chalk }}>
        <div
          className="absolute inset-0 pointer-events-none"
          style={{ background: "repeating-linear-gradient(90deg, rgba(251,246,232,.05) 0 1px, transparent 1px 8px)" }}
        />
        <div className="relative flex items-center gap-3">
          <svg width="38" height="38" viewBox="0 0 40 40" aria-hidden="true">
            <circle cx="20" cy="20" r="17" fill={C.chalk} stroke={C.deep} strokeWidth="1.4" />
            <path d="M8 8 Q 20 20 8 32" fill="none" stroke={C.out} strokeWidth="2" strokeDasharray="2.4 2.2" strokeLinecap="round" />
            <path d="M32 8 Q 20 20 32 32" fill="none" stroke={C.out} strokeWidth="2" strokeDasharray="2.4 2.2" strokeLinecap="round" />
          </svg>
          <div>
            <div className="slab text-3xl leading-none" style={{ letterSpacing: ".01em" }}>ROCKHOUNDS</div>
            <div className="font-mono text-xs mt-1" style={{ color: C.gold, letterSpacing: ".32em" }}>SUMMER BALL · LINEUP CARD</div>
          </div>
        </div>
      </div>
      <div className="stitch" />
      <div style={{ background: C.card, borderBottom: `1px solid ${C.line}` }} className="flex sticky top-0 z-10">
        <TabBtn id="game" label="Games" />
        <TabBtn id="roster" label="Roster" />
        <TabBtn id="stats" label="Season" />
      </div>

      {/* ============ GAMES ============ */}
      {view === "game" && phase === "list" && (
        <div className="px-4 pt-4 flex flex-col gap-3">
          <div className="font-mono text-xs" style={{ color: C.faint }}>
            {games.length} of {SEASON_GAMES} games saved · changes save automatically
          </div>
          {games.map((g) => (
            <div
              key={g.num}
              className="flex items-stretch rounded overflow-hidden"
              style={CARD}
            >
              <button onClick={() => openGame(g)} className="flex-1 text-left px-4 py-3">
                <div className="font-bold">Game {g.num}</div>
                <div className="font-mono text-xs" style={{ color: C.faint }}>
                  {g.date} · {g.attend.length} played
                </div>
              </button>
              <button
                onClick={() =>
                  armDelete === g.num ? deleteGame(g.num) : setArmDelete(g.num)
                }
                className="px-4 font-mono text-xs"
                style={{ color: armDelete === g.num ? "#fff" : C.out, background: armDelete === g.num ? C.out : "transparent" }}
              >
                {armDelete === g.num ? "sure?" : "✕"}
              </button>
            </div>
          ))}
          {roster.length === 0 ? (
            <div className="text-sm py-6 text-center" style={{ color: C.faint }}>
              Add your kids on the Roster tab first.
            </div>
          ) : (
            <Btn onClick={startNew}>New game</Btn>
          )}
        </div>
      )}

      {view === "game" && phase === "att" && (
        <div className="px-4 pt-4 flex flex-col gap-3">
          <div className="font-bold text-lg">Game {attNum} — who's out?</div>
          <div className="font-mono text-xs" style={{ color: C.faint }}>
            Tap anyone who can't make it. Late arrivals: leave them OUT here, add them mid-game with Manage Players.
          </div>
          <div className="flex flex-col gap-2">
            {roster.map((r) => {
              const isOut = outIds.includes(r.id);
              return (
                <button
                  key={r.id}
                  onClick={() =>
                    setOutIds(
                      isOut ? outIds.filter((x) => x !== r.id) : [...outIds, r.id]
                    )
                  }
                  className="flex items-center justify-between px-4 py-3 rounded text-left"
                  style={{
                    background: isOut ? "#F6E4DF" : C.card,
                    border: `1px solid ${isOut ? C.out : C.line}`,
                    color: isOut ? C.out : C.ink,
                  }}
                >
                  <span className="font-semibold" style={{ textDecoration: isOut ? "line-through" : "none" }}>
                    {r.name}
                  </span>
                  <span className="font-mono text-xs">{isOut ? "OUT" : "IN"}</span>
                </button>
              );
            })}
          </div>
          {(() => {
            const n = roster.length - outIds.length;
            const sitPerInning = Math.max(0, n - POSITIONS.length);
            const slots = sitPerInning * 6;
            const doubles = Math.max(0, slots - n);
            return (
              <div className="font-mono text-xs leading-5 px-1" style={{ color: C.faint }}>
                {n} playing · {sitPerInning} sit each inning
                {doubles > 0 &&
                  ` · ${doubles} kids sit twice today (never back-to-back, rotated across the season)`}
                {n < POSITIONS.length && n >= 2 && ` · short-handed: filling ${n} positions`}
              </div>
            );
          })()}
          <Btn onClick={runGenerate} disabled={roster.length - outIds.length < 2}>
            Build lineup
          </Btn>
          <Btn kind="ghost" onClick={() => setPhase("list")}>
            Back
          </Btn>
        </div>
      )}

      {view === "game" && phase === "lineup" && draft && (
        <div className="px-4 pt-4 flex flex-col gap-4">
          <div className="flex items-center justify-between">
            <button onClick={() => setPhase("list")} className="font-mono text-xs" style={{ color: C.faint }}>
              ← Games
            </button>
            <div className="font-mono text-xs" style={{ color: C.faint }}>
              GAME {draft.num} · {(draft.availByInning[curInning] || []).length} IN THIS INNING
            </div>
          </div>

          <Btn onClick={enterGameMode}>▶ Game Mode (big screen)</Btn>

          {/* batting order */}
          <div className="rounded p-3" style={CARD}>
            <div className="flex items-center justify-between mb-2">
              <div className="font-mono text-xs tracking-widest" style={{ color: C.faint }}>
                BATTING ORDER — TAP NAME = UP NEXT
              </div>
              <div className="flex gap-2">
                <button
                  onClick={copyLineup}
                  className="font-mono text-xs px-3 py-1 rounded"
                  style={{ color: C.green, border: `1.5px solid ${C.green}` }}
                >
                  {copied ? "COPIED ✓" : "COPY"}
                </button>
                <button
                  onClick={() => window.print()}
                  className="font-mono text-xs px-3 py-1 rounded"
                  style={{ color: C.green, border: `1.5px solid ${C.green}` }}
                >
                  PRINT
                </button>
              </div>
            </div>
            <div className="flex flex-col gap-1">
              {draft.batting.map((id, i) => {
                const tag = tagFor(i);
                const here = (draft.availByInning[curInning] || []).includes(id);
                return (
                  <div key={id} className="flex items-center gap-2 text-base">
                    <span className="font-mono w-8 text-right" style={{ color: C.faint }}>
                      {i + 1}:
                    </span>
                    <button
                      onClick={() => setNextUp(id)}
                      className="font-semibold flex-1 text-left"
                      style={{ opacity: here ? 1 : 0.4, textDecoration: here ? "none" : "line-through" }}
                    >
                      {nameOf(id)}
                      {tag === "UP" && (
                        <span className="font-mono text-xs ml-2 px-2 py-0.5 rounded font-bold" style={{ background: C.gold }}>
                          UP
                        </span>
                      )}
                    </button>
                    <button onClick={() => moveBat(i, -1)} disabled={i === 0} className="font-mono px-2 py-1 rounded" style={{ border: `1px solid ${C.line}`, color: C.faint, opacity: i === 0 ? 0.3 : 1 }}>
                      ↑
                    </button>
                    <button onClick={() => moveBat(i, 1)} disabled={i === draft.batting.length - 1} className="font-mono px-2 py-1 rounded" style={{ border: `1px solid ${C.line}`, color: C.faint, opacity: i === draft.batting.length - 1 ? 0.3 : 1 }}>
                      ↓
                    </button>
                  </div>
                );
              })}
            </div>
          </div>

          {/* fairness check */}
          {(() => {
            const issues = auditGame(draft);
            const ok = issues.length === 0;
            return (
              <div
                className="rounded px-4 py-2"
                style={{
                  background: ok ? "#E9F0E1" : "#F7E5DB",
                  border: `1px solid ${ok ? C.green : C.out}`,
                }}
              >
                <div className="font-mono text-sm font-bold tracking-widest" style={{ color: ok ? C.green : C.out }}>
                  {ok ? "✓ FAIRNESS CHECK: CLEAN" : "⚠ " + issues.length + " FAIRNESS ISSUE" + (issues.length > 1 ? "S" : "")}
                </div>
                {!ok &&
                  issues.map((s, i) => (
                    <div key={i} className="font-mono text-sm pt-1" style={{ color: C.out }}>
                      • {s}
                    </div>
                  ))}
              </div>
            );
          })()}

          {/* inning selector */}
          <div className="grid grid-cols-6 gap-1">
            {[0, 1, 2, 3, 4, 5].map((i) => (
              <button
                key={i}
                onClick={() => {
                  setCurInning(i);
                  setSel(null);
                }}
                className="py-3 rounded font-mono font-bold"
                style={
                  curInning === i
                    ? { background: C.green, color: "#fff" }
                    : { background: C.card, color: C.faint, border: `1px solid ${C.line}` }
                }
              >
                {i + 1}
              </button>
            ))}
          </div>

          {/* the card */}
          <div className="rounded overflow-hidden" style={CARD}>
            <div className="px-4 py-2 font-mono text-xs tracking-widest flex justify-between" style={{ background: C.benchBg, color: C.faint }}>
              <span>INNING {curInning + 1}</span>
              <span>{sel ? "TAP A SECOND KID TO SWAP" : "TAP TWO KIDS TO SWAP"}</span>
            </div>
            {inningPositions(curInning).map((p) => {
              const id = draft.innings[curInning][p];
              const selected = sel && sel.id === id && sel.pos === p;
              const pinned = (draft.pins[curInning] || {})[p] === id;
              return (
                <div
                  key={p}
                  className="w-full flex items-center gap-3 px-4 py-3"
                  style={{
                    borderTop: `1px solid ${C.line}`,
                    background: selected ? C.goldSoft : "transparent",
                  }}
                >
                  <button onClick={() => tapRow(id, p)} className="flex items-center gap-3 flex-1 text-left">
                    <span
                      className="font-mono font-bold text-base w-11 text-center py-1 rounded"
                      style={{
                        background: OF.has(p) ? C.green : C.clay,
                        color: C.chalk,
                      }}
                    >
                      {p}
                    </span>
                    <span className="text-xl font-bold">{nameOf(id)}</span>
                  </button>
                  <button
                    onClick={() => togglePin(p, id)}
                    className="font-mono text-xs px-2 py-1 rounded"
                    style={{
                      background: pinned ? C.gold : "transparent",
                      border: `1px solid ${pinned ? C.gold : C.line}`,
                      color: pinned ? C.ink : C.faint,
                    }}
                  >
                    {pinned ? "🔒 LOCKED" : "lock"}
                  </button>
                </div>
              );
            })}
            {benchFor(curInning).length > 0 && (
              <div style={{ borderTop: `2px solid ${C.line}`, background: C.benchBg }} className="px-4 py-3">
                <div className="font-mono text-xs tracking-widest mb-1" style={{ color: C.faint }}>
                  BENCH
                </div>
                <div className="flex flex-wrap gap-2">
                  {benchFor(curInning).map((id) => {
                    const selected = sel && sel.id === id && !sel.pos;
                    const nth = sitsSoFar(id, curInning);
                    return (
                      <button
                        key={id}
                        onClick={() => tapRow(id, null)}
                        className="px-3 py-2 rounded font-semibold text-sm"
                        style={{
                          background: selected ? C.goldSoft : C.card,
                          border: `1px solid ${selected ? C.gold : C.line}`,
                        }}
                      >
                        {nameOf(id)}
                        {nth >= 2 && (
                          <span className="font-mono text-xs ml-1" style={{ color: C.out }}>
                            ×{nth}
                          </span>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {/* manage players — god mode */}
          <Btn kind="ghost" onClick={() => setManaging(!managing)}>
            {managing ? "Close Manage Players" : `Manage Players (inning ${curInning + 1} on)`}
          </Btn>
          {managing && (
            <div className="rounded p-3 flex flex-col gap-2" style={CARD}>
              <div className="font-mono text-xs leading-5" style={{ color: C.faint }}>
                Toggles apply from inning {curInning + 1} through 6. Innings before that stay exactly as played. Remaining innings rebuild instantly. Late arrival? Toggle them IN, then set their batting spot with the arrows.
              </div>
              {roster.map((r) => {
                const isIn = (draft.availByInning[curInning] || []).includes(r.id);
                return (
                  <button
                    key={r.id}
                    onClick={() => toggleAvail(r.id)}
                    className="flex items-center justify-between px-4 py-3 rounded text-left"
                    style={{
                      background: isIn ? C.card : "#F6E4DF",
                      border: `1px solid ${isIn ? C.line : C.out}`,
                      color: isIn ? C.ink : C.out,
                    }}
                  >
                    <span className="font-semibold" style={{ textDecoration: isIn ? "none" : "line-through" }}>
                      {r.name}
                    </span>
                    <span className="font-mono text-xs">{isIn ? "IN" : "OUT"}</span>
                  </button>
                );
              })}
            </div>
          )}

          <Btn kind="ghost" onClick={reshuffle}>
            Reshuffle innings {curInning + 1}–6
          </Btn>
          <button onClick={editAttendance} className="font-mono text-xs py-1" style={{ color: C.faint }}>
            Rebuild whole game from scratch (pre-game only — wipes swaps & batting edits)
          </button>
        </div>
      )}

      {/* ============ ROSTER ============ */}
      {view === "roster" && (
        <div className="px-4 pt-4 flex flex-col gap-3">
          {roster.map((r) => (
            <div
              key={r.id}
              className="flex items-center rounded overflow-hidden"
              style={CARD}
            >
              <input
                value={r.name}
                onChange={(e) => renameKid(r.id, e.target.value)}
                className="flex-1 px-4 py-3 font-semibold bg-transparent outline-none"
                style={{ color: C.ink }}
              />
              <button
                onClick={() =>
                  armDelete === r.id ? removeKid(r.id) : setArmDelete(r.id)
                }
                className="px-4 py-3 font-mono text-xs"
                style={{
                  color: armDelete === r.id ? "#fff" : C.out,
                  background: armDelete === r.id ? C.out : "transparent",
                }}
              >
                {armDelete === r.id ? "sure?" : "✕"}
              </button>
            </div>
          ))}
          <div className="rounded p-3" style={CARD}>
            <div className="font-mono text-xs tracking-widest mb-2" style={{ color: C.faint }}>
              ADD PLAYERS — ONE NAME PER LINE
            </div>
            <textarea
              value={bulk}
              onChange={(e) => setBulk(e.target.value)}
              rows={roster.length ? 2 : 8}
              placeholder={"Theo\nMason\nCarter\n…"}
              className="w-full p-2 rounded text-sm outline-none"
              style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink }}
            />
            <div className="mt-2">
              <Btn onClick={addBulk} disabled={!bulk.trim()}>
                Add to roster
              </Btn>
            </div>
          </div>
          <div className="font-mono text-xs px-1" style={{ color: C.faint }}>
            {roster.length} on roster
          </div>
        </div>
      )}

      {/* ============ SEASON ============ */}
      {view === "stats" && (
        <div className="px-4 pt-4 flex flex-col gap-2">
          {games.length === 0 && (
            <div className="text-sm py-6 text-center" style={{ color: C.faint }}>
              Play a game and season totals show up here.
            </div>
          )}
          {games.length > 0 && (
            <React.Fragment>
              <div className="grid gap-2 font-mono text-xs px-4" style={{ gridTemplateColumns: "1fr 2rem 2rem 2rem 2rem 2rem", color: C.faint }}>
                <span>PLAYER</span>
                <span className="text-right">GP</span>
                <span className="text-right">SIT</span>
                <span className="text-right">×2</span>
                <span className="text-right">IF</span>
                <span className="text-right">OF</span>
              </div>
              {roster.map((r) => {
                const st = stats[r.id] || { gp: 0, sits: 0, dbl: 0, inf: 0, of: 0, pos: {} };
                const open = expanded === r.id;
                return (
                  <div key={r.id} className="rounded" style={CARD}>
                    <button
                      onClick={() => setExpanded(open ? null : r.id)}
                      className="w-full grid gap-2 items-center px-4 py-3 text-left"
                      style={{ gridTemplateColumns: "1fr 2rem 2rem 2rem 2rem 2rem" }}
                    >
                      <span className="font-semibold text-sm truncate">{r.name}</span>
                      <span className="font-mono text-sm text-right">{st.gp}</span>
                      <span className="font-mono text-sm text-right">{st.sits}</span>
                      <span className="font-mono text-sm text-right" style={{ color: st.dbl ? C.out : C.faint }}>{st.dbl}</span>
                      <span className="font-mono text-sm text-right">{st.inf}</span>
                      <span className="font-mono text-sm text-right">{st.of}</span>
                    </button>
                    {open && (
                      <div className="px-4 pb-3 flex flex-wrap gap-1">
                        {DISPLAY_ORDER.map((p) => (
                          <span
                            key={p}
                            className="font-mono text-xs px-2 py-1 rounded"
                            style={{
                              background: (st.pos[p] || 0) > 0 ? C.benchBg : "transparent",
                              border: `1px solid ${C.line}`,
                              color: (st.pos[p] || 0) > 0 ? C.ink : C.faint,
                            }}
                          >
                            {p} {st.pos[p] || 0}
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
              <div className="font-mono text-xs px-1 pt-1 leading-5" style={{ color: C.faint }}>
                GP games · SIT bench innings · ×2 games with a double sit · IF/OF innings played
              </div>
            </React.Fragment>
          )}
          <div className="flex flex-col gap-2 pt-3">
            <Btn kind="ghost" onClick={exportData}>Export season backup</Btn>
            <label
              className="px-4 py-3 rounded font-semibold text-sm w-full text-center cursor-pointer"
              style={{ background: "transparent", color: C.green, border: `1.5px solid ${C.green}` }}
            >
              Restore from backup
              <input type="file" accept=".json,application/json" className="hidden" onChange={importData} />
            </label>
            {restoreMsg && (
              <div className="font-mono text-xs text-center" style={{ color: C.faint }}>{restoreMsg}</div>
            )}
            <div className="rounded p-3 flex flex-col gap-2 mt-2" style={CARD}>
              <div className="font-mono text-xs tracking-widest" style={{ color: C.faint }}>
                CLOUD SYNC — GITHUB
              </div>
              <div className="font-mono text-xs leading-5" style={{ color: C.faint }}>
                Saves everything to data.json in your repo after every change and loads the newest copy when the app opens — phone and iPad stay in sync, and clearing Safari can't kill the season. One-time setup: github.com/settings/personal-access-tokens/new → Repository access: Only select repositories → Rockhounds-Lineup- → Permissions: Contents → Read and write → Generate token → paste here.
              </div>
              <input
                type="password"
                value={tokenDraft}
                onChange={(e) => setTokenDraft(e.target.value)}
                placeholder="github_pat_…"
                autoCapitalize="none"
                autoCorrect="off"
                spellCheck={false}
                className="w-full p-2 rounded text-sm outline-none font-mono"
                style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink }}
              />
              <Btn onClick={() => saveToken(tokenDraft)} disabled={!tokenDraft.trim()}>
                Save token & sync
              </Btn>
              {token && (
                <Btn kind="ghost" onClick={() => cloudPush(token, { roster, games, updatedAt: Date.now() })}>
                  Sync now
                </Btn>
              )}
              <div className="font-mono text-xs" style={{ color: C.faint }}>
                {token ? syncMsg || "sync on" : "sync off — data lives in this browser only"}
              </div>
            </div>
          </div>
        </div>
      )}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RockhoundsLineup />);
</script>
</body>
</html>
