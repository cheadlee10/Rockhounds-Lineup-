<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Rockhounds Lineup</title>
<meta name="theme-color" content="#255C42">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Rockhounds">
<link rel="apple-touch-icon" href="icon.png">
<link rel="icon" href="icon.png">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.5/babel.min.js"></script>

<body>
<div id="root"></div>
<script type="text/babel" data-presets="react">
const { useState, useEffect } = React;

// ---------- constants ----------
// CF removed from active play; kept in display/stat maps so old saved games still render
const POSITIONS = ["P", "C", "1B", "2B", "3B", "SS", "LF", "LC", "RC", "RF"];
const DISPLAY_ORDER = ["P", "C", "1B", "2B", "3B", "SS", "LF", "LC", "CF", "RC", "RF"];
const OF = new Set(["LF", "LC", "CF", "RC", "RF"]);
const FILL_PRIORITY = ["P", "C", "1B", "2B", "3B", "SS", "LF", "RF", "LC", "RC"];
const POS_LABELS = {
  P: "Pitcher", C: "Catcher", "1B": "1st Base", "2B": "2nd Base", "3B": "3rd Base",
  SS: "Shortstop", LF: "Left Field", LC: "Left Center", CF: "Center Field",
  RC: "Right Center", RF: "Right Field",
};
const KEY = "rockhounds-lineup-v1";
const SEASON_GAMES = 10;
const DEFAULT_ROSTER = [
  "Theo", "Chase", "Wallace", "Dylan", "Parker", "Dominic", "Avery",
  "Jack", "James", "Lucian", "Emmett", "Griffin", "Miles", "Nolan",
].map((name, i) => ({ id: "seed" + (i + 1), name }));

// field diagram coordinates (viewBox 0 0 100 74)
const FIELD_XY = {
  P: [50, 46], C: [50, 66], "1B": [72, 42], "2B": [60, 30], SS: [40, 30], "3B": [28, 42],
  LF: [15, 15], LC: [38, 8], CF: [50, 6], RC: [62, 8], RF: [85, 15],
};

// scorebook palette
const C = {
  bg: "#F1F5EE",
  card: "#FAFCF8",
  ink: "#1C352A",
  faint: "#5C7265",
  line: "#C9D8C6",
  green: "#255C42",
  out: "#A63A22",
  gold: "#E9B948",
  goldSoft: "#FBEFD2",
  benchBg: "#E7EDE4",
};

// ---------- helpers ----------
function migrateGame(g) {
  const m = { ...g };
  if (!m.availByInning) m.availByInning = Array.from({ length: 6 }, () => [...(m.attend || [])]);
  if (!m.pins) m.pins = [{}, {}, {}, {}, {}, {}];
  if (!m.nextUp) m.nextUp = (m.batting && m.batting[0]) || null;
  return m;
}

// ---------- season stats from saved games ----------
function computeStats(games) {
  const s = {};
  const ensure = (id) =>
    (s[id] ||= { gp: 0, sits: 0, dbl: 0, inf: 0, of: 0, pos: {} });
  for (const raw of games) {
    const g = migrateGame(raw);
    const gameSits = {};
    for (const id of g.attend) {
      ensure(id).gp += 1;
      gameSits[id] = 0;
    }
    g.innings.forEach((inn, i) => {
      const playing = new Set(Object.values(inn).filter(Boolean));
      for (const [pos, id] of Object.entries(inn)) {
        if (!id) continue;
        const st = ensure(id);
        st.pos[pos] = (st.pos[pos] || 0) + 1;
        if (OF.has(pos)) st.of += 1;
        else st.inf += 1;
      }
      for (const id of g.availByInning[i] || [])
        if (!playing.has(id)) {
          ensure(id).sits += 1;
          gameSits[id] = (gameSits[id] || 0) + 1;
        }
    });
    for (const id of g.attend) if ((gameSits[id] || 0) >= 2) ensure(id).dbl += 1;
  }
  return s;
}

// ---------- lineup builder ----------
// Rebuilds innings from startIdx onward. Innings before startIdx are kept
// exactly as-is (played innings stay locked). Honors pins and per-inning
// availability. Rules: no outfield twice in a row (bench resets it), never
// sit back-to-back, everyone sits once before anyone sits twice, then lowest
// season sit load, then position variety in-game and across the season.
function buildInnings(game, startIdx, otherGames) {
  const stats = computeStats(otherGames);
  const innings = game.innings.slice(0, startIdx);
  const sitsGame = {};
  const gamePos = {};
  const touch = (id) => {
    if (!(id in sitsGame)) sitsGame[id] = 0;
    if (!(id in gamePos)) gamePos[id] = {};
  };
  let last = {}; // id -> position code or "SIT"

  // replay frozen innings to rebuild fairness state
  for (let i = 0; i < startIdx; i++) {
    const inn = innings[i] || {};
    const playing = new Set(Object.values(inn).filter(Boolean));
    const next = {};
    for (const [p, id] of Object.entries(inn)) {
      if (!id) continue;
      touch(id);
      gamePos[id][p] = (gamePos[id][p] || 0) + 1;
      next[id] = p;
    }
    for (const id of game.availByInning[i] || [])
      if (!playing.has(id)) {
        touch(id);
        sitsGame[id] += 1;
        next[id] = "SIT";
      }
    last = next;
  }

  for (let i = startIdx; i < 6; i++) {
    const avail = game.availByInning[i] || [];
    avail.forEach(touch);
    const n = avail.length;
    const posList = n >= POSITIONS.length ? POSITIONS : FILL_PRIORITY.slice(0, Math.max(n, 0));
    const jit = Object.fromEntries(avail.map((id) => [id, Math.random()]));

    const assign = {};
    const used = new Set();

    // pinned assignments first — they survive every rebuild
    const pinsI = (game.pins && game.pins[i]) || {};
    for (const [p, id] of Object.entries(pinsI)) {
      if (posList.includes(p) && avail.includes(id) && !used.has(id) && !(p in assign)) {
        assign[p] = id;
        used.add(id);
      }
    }

    // pick sitters
    const sitCount = Math.max(0, n - posList.length);
    let sitters = [];
    if (sitCount > 0) {
      const cands = avail.filter((id) => !used.has(id));
      const ranked = [...cands].sort(
        (a, b) =>
          ((last[a] === "SIT" ? 1 : 0) - (last[b] === "SIT" ? 1 : 0)) ||
          (sitsGame[a] - sitsGame[b]) ||
          ((stats[a]?.sits || 0) + (stats[a]?.dbl || 0) -
            ((stats[b]?.sits || 0) + (stats[b]?.dbl || 0))) ||
          (jit[a] - jit[b])
      );
      sitters = ranked.slice(0, sitCount);
    }
    const sitSet = new Set(sitters);
    const playing = avail.filter((id) => !sitSet.has(id) && !used.has(id));

    const score = (id, pos) =>
      (gamePos[id][pos] || 0) * 1000 + (stats[id]?.pos?.[pos] || 0) * 10 + jit[id];

    const ifSpots = posList.filter((p) => !OF.has(p));

    // kids who played outfield last inning must go infield this inning
    const restricted = playing.filter((id) => OF.has(last[id]));
    for (const kid of restricted) {
      const open = ifSpots.filter((p) => !(p in assign));
      const pool = open.length ? open : posList.filter((p) => !(p in assign));
      if (!pool.length) break;
      const best = [...pool].sort((a, b) => score(kid, a) - score(kid, b))[0];
      assign[best] = kid;
      used.add(kid);
    }
    for (const p of posList) {
      if (p in assign) continue;
      const cands = playing.filter((id) => !used.has(id));
      if (!cands.length) break;
      const best = [...cands].sort((a, b) => score(a, p) - score(b, p))[0];
      assign[p] = best;
      used.add(best);
    }

    const next = {};
    for (const id of sitters) {
      next[id] = "SIT";
      sitsGame[id] += 1;
    }
    for (const [p, id] of Object.entries(assign)) {
      next[id] = p;
      gamePos[id][p] = (gamePos[id][p] || 0) + 1;
    }
    last = next;
    innings.push(assign);
  }
  return innings;
}

function newGame(attendIds, gameNum, roster, otherGames) {
  const g = {
    num: gameNum,
    date: new Date().toISOString().slice(0, 10),
    attend: [...attendIds],
    availByInning: Array.from({ length: 6 }, () => [...attendIds]),
    pins: [{}, {}, {}, {}, {}, {}],
    innings: [],
    batting: [],
    nextUp: null,
  };
  g.innings = buildInnings(g, 0, otherGames);
  // batting: season rotation (shift 3 per game), inning-1 sitters float to the top
  const ids = roster.map((r) => r.id);
  const shift = ids.length ? ((gameNum - 1) * 3) % ids.length : 0;
  const rot = [...ids.slice(shift), ...ids.slice(0, shift)].filter((id) => attendIds.includes(id));
  const playing1 = new Set(Object.values(g.innings[0] || {}).filter(Boolean));
  g.batting = [...rot.filter((id) => !playing1.has(id)), ...rot.filter((id) => playing1.has(id))];
  g.nextUp = g.batting[0] || null;
  return g;
}

// ---------- app ----------
function RockhoundsLineup() {
  const [loaded, setLoaded] = useState(false);
  const [roster, setRoster] = useState([]);
  const [games, setGames] = useState([]);
  const [view, setView] = useState("game"); // game | roster | stats
  const [phase, setPhase] = useState("list"); // list | att | lineup
  const [outIds, setOutIds] = useState([]);
  const [attNum, setAttNum] = useState(1);
  const [draft, setDraft] = useState(null);
  const [curInning, setCurInning] = useState(0);
  const [sel, setSel] = useState(null); // swap selection {id, pos|null}
  const [bulk, setBulk] = useState("");
  const [armDelete, setArmDelete] = useState(null);
  const [expanded, setExpanded] = useState(null);
  const [managing, setManaging] = useState(false);
  const [gameMode, setGameMode] = useState(false);
  const [restoreMsg, setRestoreMsg] = useState("");

  useEffect(() => {
    let found = false;
    try {
      const raw = localStorage.getItem(KEY);
      if (raw) {
        const d = JSON.parse(raw);
        if (Array.isArray(d.roster) && d.roster.length) {
          setRoster(d.roster);
          found = true;
        }
        if (Array.isArray(d.games)) setGames(d.games.map(migrateGame));
      }
    } catch (e) {
      // first run — nothing saved yet
    }
    if (!found) setRoster(DEFAULT_ROSTER);
    setLoaded(true);
  }, []);

  const persist = (r, g) => {
    try {
      localStorage.setItem(KEY, JSON.stringify({ roster: r, games: g }));
    } catch (e) {
      console.error("save failed", e);
    }
  };

  // every game change autosaves — no Save button to forget mid-game
  const commit = (g) => {
    const next = [...games.filter((x) => x.num !== g.num), g].sort((a, b) => a.num - b.num);
    setGames(next);
    setDraft(g);
    persist(roster, next);
  };

  const nameOf = (id) => roster.find((r) => r.id === id)?.name || "—";
  const stats = computeStats(games);

  // ---------- roster actions ----------
  const addBulk = () => {
    const names = bulk.split("\n").map((s) => s.trim()).filter(Boolean);
    if (!names.length) return;
    const next = [
      ...roster,
      ...names.map((name, i) => ({ id: "k" + Date.now() + "_" + i, name })),
    ];
    setRoster(next);
    setBulk("");
    persist(next, games);
  };
  const renameKid = (id, name) => {
    const next = roster.map((r) => (r.id === id ? { ...r, name } : r));
    setRoster(next);
    persist(next, games);
  };
  const removeKid = (id) => {
    const next = roster.filter((r) => r.id !== id);
    setRoster(next);
    persist(next, games);
  };

  // ---------- game actions ----------
  const startNew = () => {
    const nums = games.map((g) => g.num);
    setAttNum(nums.length ? Math.max(...nums) + 1 : 1);
    setOutIds([]);
    setPhase("att");
  };
  const editAttendance = () => {
    if (!draft) return;
    setAttNum(draft.num);
    setOutIds(roster.map((r) => r.id).filter((id) => !draft.attend.includes(id)));
    setPhase("att");
  };
  const runGenerate = () => {
    const attend = roster.map((r) => r.id).filter((id) => !outIds.includes(id));
    if (attend.length < 2) return;
    const others = games.filter((g) => g.num !== attNum);
    const g = newGame(attend, attNum, roster, others);
    commit(g);
    setCurInning(0);
    setSel(null);
    setManaging(false);
    setPhase("lineup");
  };
  const reshuffle = () => {
    if (!draft) return;
    const others = games.filter((g) => g.num !== draft.num);
    const g = { ...draft, innings: buildInnings(draft, curInning, others) };
    commit(g);
    setSel(null);
  };
  const openGame = (raw) => {
    setDraft(migrateGame(raw));
    setCurInning(0);
    setSel(null);
    setManaging(false);
    setPhase("lineup");
  };
  const deleteGame = (num) => {
    const next = games.filter((g) => g.num !== num);
    setGames(next);
    persist(roster, next);
    setArmDelete(null);
  };

  // ---------- god mode: per-inning availability ----------
  const toggleAvail = (id) => {
    const g = {
      ...draft,
      availByInning: draft.availByInning.map((a) => [...a]),
      attend: [...draft.attend],
      batting: [...draft.batting],
    };
    const isIn = g.availByInning[curInning].includes(id);
    for (let i = curInning; i < 6; i++) {
      if (isIn) g.availByInning[i] = g.availByInning[i].filter((x) => x !== id);
      else if (!g.availByInning[i].includes(id)) g.availByInning[i].push(id);
    }
    if (!isIn) {
      if (!g.attend.includes(id)) g.attend.push(id);
      if (!g.batting.includes(id)) g.batting.push(id); // slot them where you want with the arrows
    }
    const others = games.filter((x) => x.num !== g.num);
    g.innings = buildInnings(g, curInning, others);
    commit(g);
    setSel(null);
  };

  // ---------- pins ----------
  const togglePin = (pos, id) => {
    const pins = draft.pins.map((p) => ({ ...p }));
    if (pins[curInning][pos] === id) delete pins[curInning][pos];
    else pins[curInning][pos] = id;
    commit({ ...draft, pins });
  };

  // ---------- batting order ----------
  const moveBat = (i, dir) => {
    const j = i + dir;
    if (j < 0 || j >= draft.batting.length) return;
    const batting = [...draft.batting];
    [batting[i], batting[j]] = [batting[j], batting[i]];
    commit({ ...draft, batting });
  };
  const setNextUp = (id) => commit({ ...draft, nextUp: id });
  const tagFor = (i) => {
    const k = draft.batting.indexOf(draft.nextUp);
    if (k < 0) return null;
    const L = draft.batting.length;
    const d = (i - k + L) % L;
    return d === 0 ? "UP" : d === 1 ? "ON DECK" : d === 2 ? "IN HOLE" : null;
  };

  // ---------- swap ----------
  const tapRow = (id, pos) => {
    if (!draft) return;
    if (!sel) {
      setSel({ id, pos });
      return;
    }
    if (sel.id === id) {
      setSel(null);
      return;
    }
    const inn = { ...draft.innings[curInning] };
    if (sel.pos && pos) {
      inn[sel.pos] = id;
      inn[pos] = sel.id;
    } else if (sel.pos && !pos) {
      inn[sel.pos] = id; // bench kid takes the spot, sel.id goes to bench
    } else if (!sel.pos && pos) {
      inn[pos] = sel.id;
    }
    // a manual swap overrides any pin on the touched spots
    const pins = draft.pins.map((p) => ({ ...p }));
    if (sel.pos) delete pins[curInning][sel.pos];
    if (pos) delete pins[curInning][pos];
    const innings = draft.innings.map((x, i) => (i === curInning ? inn : x));
    commit({ ...draft, innings, pins });
    setSel(null);
  };

  // ---------- derived ----------
  const benchFor = (i) => {
    if (!draft) return [];
    const playing = new Set(Object.values(draft.innings[i]).filter(Boolean));
    return (draft.availByInning[i] || []).filter((id) => !playing.has(id));
  };
  const sitsSoFar = (id, through) => {
    if (!draft) return 0;
    let c = 0;
    for (let i = 0; i <= through; i++) {
      const playing = new Set(Object.values(draft.innings[i]).filter(Boolean));
      if ((draft.availByInning[i] || []).includes(id) && !playing.has(id)) c++;
    }
    return c;
  };
  const inningPositions = (i) =>
    DISPLAY_ORDER.filter((p) => p in (draft?.innings[i] || {}));

  // ---------- backup / restore ----------
  const exportData = () => {
    const blob = new Blob([JSON.stringify({ roster, games }, null, 2)], { type: "application/json" });
    const a = document.createElement("a");
    a.href = URL.createObjectURL(blob);
    a.download = "rockhounds-backup-" + new Date().toISOString().slice(0, 10) + ".json";
    a.click();
    URL.revokeObjectURL(a.href);
  };
  const importData = (e) => {
    const file = e.target.files && e.target.files[0];
    if (!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try {
        const d = JSON.parse(reader.result);
        if (!Array.isArray(d.roster) || !Array.isArray(d.games)) throw new Error("bad file");
        setRoster(d.roster);
        setGames(d.games.map(migrateGame));
        persist(d.roster, d.games);
        setRestoreMsg("Restored ✓");
      } catch (err) {
        setRestoreMsg("That file didn't work");
      }
      setTimeout(() => setRestoreMsg(""), 2500);
    };
    reader.readAsText(file);
    e.target.value = "";
  };

  if (!loaded)
    return (
      <div style={{ background: C.bg, color: C.faint }} className="min-h-screen flex items-center justify-center font-mono text-sm">
        Loading roster…
      </div>
    );

  // ---------- shared UI bits ----------
  const TabBtn = ({ id, label }) => (
    <button
      onClick={() => setView(id)}
      className="flex-1 py-3 font-mono text-xs tracking-widest uppercase"
      style={{
        color: view === id ? C.ink : C.faint,
        borderBottom: view === id ? `3px solid ${C.green}` : `3px solid transparent`,
        background: "transparent",
      }}
    >
      {label}
    </button>
  );

  const Btn = ({ onClick, children, kind = "solid", disabled }) => (
    <button
      onClick={onClick}
      disabled={disabled}
      className="px-4 py-3 rounded font-semibold text-sm w-full"
      style={
        kind === "solid"
          ? { background: disabled ? C.line : C.green, color: "#fff" }
          : { background: "transparent", color: C.green, border: `1.5px solid ${C.green}` }
      }
    >
      {children}
    </button>
  );

  // ---------- GAME MODE (iPad on the fence) ----------
  const GameModeScreen = () => {
    const inn = draft.innings[curInning] || {};
    const availNow = draft.availByInning[curInning] || [];
    return (
      <div className="fixed inset-0 z-50 flex" style={{ background: C.bg, color: C.ink }}>
        {/* batting order — left */}
        <div className="w-1/3 flex flex-col overflow-y-auto" style={{ background: C.card, borderRight: `2px solid ${C.line}` }}>
          <div className="px-4 py-3 font-mono text-sm tracking-widest" style={{ background: C.green, color: "#F4F8F2" }}>
            BATTING ORDER
          </div>
          {draft.batting.map((id, i) => {
            const tag = tagFor(i);
            const here = availNow.includes(id);
            return (
              <button
                key={id}
                onClick={() => setNextUp(id)}
                className="flex items-center gap-3 px-4 py-2 text-left"
                style={{
                  borderBottom: `1px solid ${C.line}`,
                  background: tag === "UP" ? C.goldSoft : "transparent",
                  opacity: here ? 1 : 0.35,
                }}
              >
                <span className="font-mono text-lg w-8 text-right" style={{ color: C.faint }}>
                  {i + 1}:
                </span>
                <span className="text-2xl font-bold flex-1" style={{ textDecoration: here ? "none" : "line-through" }}>
                  {nameOf(id)}
                </span>
                {tag && (
                  <span
                    className="font-mono text-xs px-2 py-1 rounded font-bold"
                    style={{
                      background: tag === "UP" ? C.gold : "transparent",
                      border: `1.5px solid ${tag === "UP" ? C.gold : C.faint}`,
                      color: tag === "UP" ? C.ink : C.faint,
                    }}
                  >
                    {tag}
                  </span>
                )}
              </button>
            );
          })}
          <div className="px-4 py-2 font-mono text-xs mt-auto" style={{ color: C.faint }}>
            Tap a name to mark who's UP
          </div>
        </div>

        {/* field — right */}
        <div className="flex-1 flex flex-col">
          <div className="flex items-center gap-2 px-4 py-2" style={{ background: C.green, color: "#F4F8F2" }}>
            <button onClick={() => setGameMode(false)} className="font-mono text-sm px-3 py-2 rounded" style={{ border: "1.5px solid rgba(255,255,255,.5)" }}>
              ✕ EXIT
            </button>
            <div className="flex-1 flex items-center justify-center gap-1">
              <button
                onClick={() => setCurInning(Math.max(0, curInning - 1))}
                className="px-4 py-2 font-mono text-xl font-bold rounded"
                style={{ border: "1.5px solid rgba(255,255,255,.5)", opacity: curInning === 0 ? 0.3 : 1 }}
              >
                ‹
              </button>
              <div className="px-5 py-2 font-mono text-xl font-bold tracking-widest">
                INNING {curInning + 1}
              </div>
              <button
                onClick={() => setCurInning(Math.min(5, curInning + 1))}
                className="px-4 py-2 font-mono text-xl font-bold rounded"
                style={{ border: "1.5px solid rgba(255,255,255,.5)", opacity: curInning === 5 ? 0.3 : 1 }}
              >
                ›
              </button>
            </div>
            <div className="font-mono text-sm opacity-80">GAME {draft.num}</div>
          </div>

          <div className="flex-1 flex items-center justify-center p-2">
            <svg viewBox="0 0 100 74" className="w-full h-full" preserveAspectRatio="xMidYMid meet">
              {/* grass */}
              <rect x="0" y="0" width="100" height="74" fill="#2F6B4C" rx="2" />
              {/* infield dirt */}
              <polygon points="50,64 76,38 50,12 24,38" fill="#C89B6A" />
              <polygon points="50,58 70,38 50,18 30,38" fill="#3B7A58" />
              {/* base paths */}
              <polyline points="50,58 70,38 50,18 30,38 50,58" fill="none" stroke="#FAFCF8" strokeWidth="0.8" />
              {/* bases */}
              <rect x="68.5" y="36.5" width="3" height="3" fill="#FAFCF8" transform="rotate(45 70 38)" />
              <rect x="48.5" y="16.5" width="3" height="3" fill="#FAFCF8" transform="rotate(45 50 18)" />
              <rect x="28.5" y="36.5" width="3" height="3" fill="#FAFCF8" transform="rotate(45 30 38)" />
              <rect x="48.3" y="56.3" width="3.4" height="3.4" fill="#FAFCF8" transform="rotate(45 50 58)" />
              {/* mound */}
              <circle cx="50" cy="40" r="3.4" fill="#C89B6A" />
              {/* players */}
              {inningPositions(curInning).map((p) => {
                const id = draft.innings[curInning][p];
                const [x, y] = FIELD_XY[p] || [50, 40];
                return (
                  <g key={p}>
                    <rect x={x - 12} y={y - 3.4} width="24" height="7" rx="1.6" fill="#FAFCF8" stroke={C.ink} strokeWidth="0.25" />
                    <text x={x} y={y - 4.6} textAnchor="middle" fontSize="3" fontWeight="700" fill={C.gold} fontFamily="ui-monospace, monospace">
                      {p}
                    </text>
                    <text x={x} y={y + 1.6} textAnchor="middle" fontSize="4.4" fontWeight="800" fill={C.ink} fontFamily="system-ui, sans-serif">
                      {nameOf(id)}
                    </text>
                  </g>
                );
              })}
            </svg>
          </div>

          {/* bench strip */}
          <div className="px-4 py-3 flex items-center gap-3 flex-wrap" style={{ background: C.benchBg, borderTop: `2px solid ${C.line}` }}>
            <span className="font-mono text-sm tracking-widest" style={{ color: C.faint }}>
              BENCH:
            </span>
            {benchFor(curInning).length === 0 && (
              <span className="font-mono text-sm" style={{ color: C.faint }}>
                nobody — everyone's in
              </span>
            )}
            {benchFor(curInning).map((id) => (
              <span key={id} className="text-xl font-bold px-3 py-1 rounded" style={{ background: C.card, border: `1px solid ${C.line}` }}>
                {nameOf(id)}
                {sitsSoFar(id, curInning) >= 2 && (
                  <span className="font-mono text-xs ml-1" style={{ color: C.out }}>
                    ×{sitsSoFar(id, curInning)}
                  </span>
                )}
              </span>
            ))}
          </div>
        </div>
      </div>
    );
  };

  return (
    <React.Fragment>
      <style>{`
        .print-sheet { display: none; }
        @media print {
          body { background: #fff !important; }
          .no-print { display: none !important; }
          .print-sheet { display: block !important; }
        }
      `}</style>
      {draft && (
        <div
          className="print-sheet"
          style={{
            background: "#fff",
            color: "#000",
            padding: "32px",
            fontFamily: "ui-monospace, SFMono-Regular, Menlo, monospace",
          }}
        >
          <div style={{ fontSize: "13px", letterSpacing: "3px" }}>
            ROCKHOUNDS · GAME {draft.num} · {draft.date}
          </div>
          <div
            style={{
              fontSize: "30px",
              fontWeight: 800,
              margin: "6px 0 20px",
              fontFamily: "system-ui, -apple-system, sans-serif",
            }}
          >
            Batting Order
          </div>
          {draft.batting.map((id, i) => (
            <div
              key={id}
              style={{
                display: "flex",
                gap: "16px",
                fontSize: "24px",
                padding: "7px 0",
                borderBottom: "1px solid #ccc",
              }}
            >
              <span style={{ width: "48px", textAlign: "right" }}>{i + 1}:</span>
              <span style={{ fontFamily: "system-ui, -apple-system, sans-serif", fontWeight: 700 }}>
                {nameOf(id)}
              </span>
            </div>
          ))}
        </div>
      )}

      {gameMode && draft && <GameModeScreen />}

      <div style={{ background: C.bg, color: C.ink }} className="min-h-screen pb-10 no-print">
      {/* header */}
      <div style={{ background: C.green, color: "#F4F8F2" }} className="px-4 pt-5 pb-3">
        <div className="font-mono text-xs tracking-widest opacity-80">LINEUP CARD</div>
        <div className="text-2xl font-bold tracking-tight">Rockhounds</div>
      </div>
      <div style={{ background: C.card, borderBottom: `1px solid ${C.line}` }} className="flex sticky top-0 z-10">
        <TabBtn id="game" label="Games" />
        <TabBtn id="roster" label="Roster" />
        <TabBtn id="stats" label="Season" />
      </div>

      {/* ============ GAMES ============ */}
      {view === "game" && phase === "list" && (
        <div className="px-4 pt-4 flex flex-col gap-3">
          <div className="font-mono text-xs" style={{ color: C.faint }}>
            {games.length} of {SEASON_GAMES} games saved · changes save automatically
          </div>
          {games.map((g) => (
            <div
              key={g.num}
              className="flex items-stretch rounded overflow-hidden"
              style={{ background: C.card, border: `1px solid ${C.line}` }}
            >
              <button onClick={() => openGame(g)} className="flex-1 text-left px-4 py-3">
                <div className="font-bold">Game {g.num}</div>
                <div className="font-mono text-xs" style={{ color: C.faint }}>
                  {g.date} · {g.attend.length} played
                </div>
              </button>
              <button
                onClick={() =>
                  armDelete === g.num ? deleteGame(g.num) : setArmDelete(g.num)
                }
                className="px-4 font-mono text-xs"
                style={{ color: armDelete === g.num ? "#fff" : C.out, background: armDelete === g.num ? C.out : "transparent" }}
              >
                {armDelete === g.num ? "sure?" : "✕"}
              </button>
            </div>
          ))}
          {roster.length === 0 ? (
            <div className="text-sm py-6 text-center" style={{ color: C.faint }}>
              Add your kids on the Roster tab first.
            </div>
          ) : (
            <Btn onClick={startNew}>New game</Btn>
          )}
        </div>
      )}

      {view === "game" && phase === "att" && (
        <div className="px-4 pt-4 flex flex-col gap-3">
          <div className="font-bold text-lg">Game {attNum} — who's out?</div>
          <div className="font-mono text-xs" style={{ color: C.faint }}>
            Tap anyone who can't make it. Late arrivals: leave them OUT here, add them mid-game with Manage Players.
          </div>
          <div className="flex flex-col gap-2">
            {roster.map((r) => {
              const isOut = outIds.includes(r.id);
              return (
                <button
                  key={r.id}
                  onClick={() =>
                    setOutIds(
                      isOut ? outIds.filter((x) => x !== r.id) : [...outIds, r.id]
                    )
                  }
                  className="flex items-center justify-between px-4 py-3 rounded text-left"
                  style={{
                    background: isOut ? "#F6E4DF" : C.card,
                    border: `1px solid ${isOut ? C.out : C.line}`,
                    color: isOut ? C.out : C.ink,
                  }}
                >
                  <span className="font-semibold" style={{ textDecoration: isOut ? "line-through" : "none" }}>
                    {r.name}
                  </span>
                  <span className="font-mono text-xs">{isOut ? "OUT" : "IN"}</span>
                </button>
              );
            })}
          </div>
          {(() => {
            const n = roster.length - outIds.length;
            const sitPerInning = Math.max(0, n - POSITIONS.length);
            const slots = sitPerInning * 6;
            const doubles = Math.max(0, slots - n);
            return (
              <div className="font-mono text-xs leading-5 px-1" style={{ color: C.faint }}>
                {n} playing · {sitPerInning} sit each inning
                {doubles > 0 &&
                  ` · ${doubles} kids sit twice today (never back-to-back, rotated across the season)`}
                {n < POSITIONS.length && n >= 2 && ` · short-handed: filling ${n} positions`}
              </div>
            );
          })()}
          <Btn onClick={runGenerate} disabled={roster.length - outIds.length < 2}>
            Build lineup
          </Btn>
          <Btn kind="ghost" onClick={() => setPhase("list")}>
            Back
          </Btn>
        </div>
      )}

      {view === "game" && phase === "lineup" && draft && (
        <div className="px-4 pt-4 flex flex-col gap-4">
          <div className="flex items-center justify-between">
            <button onClick={() => setPhase("list")} className="font-mono text-xs" style={{ color: C.faint }}>
              ← Games
            </button>
            <div className="font-mono text-xs" style={{ color: C.faint }}>
              GAME {draft.num} · {(draft.availByInning[curInning] || []).length} IN THIS INNING
            </div>
          </div>

          <Btn onClick={() => setGameMode(true)}>▶ Game Mode (big screen)</Btn>

          {/* batting order */}
          <div className="rounded p-3" style={{ background: C.card, border: `1px solid ${C.line}` }}>
            <div className="flex items-center justify-between mb-2">
              <div className="font-mono text-xs tracking-widest" style={{ color: C.faint }}>
                BATTING ORDER — TAP NAME = UP NEXT
              </div>
              <button
                onClick={() => window.print()}
                className="font-mono text-xs px-3 py-1 rounded"
                style={{ color: C.green, border: `1.5px solid ${C.green}` }}
              >
                PRINT
              </button>
            </div>
            <div className="flex flex-col gap-1">
              {draft.batting.map((id, i) => {
                const tag = tagFor(i);
                const here = (draft.availByInning[curInning] || []).includes(id);
                return (
                  <div key={id} className="flex items-center gap-2 text-base">
                    <span className="font-mono w-8 text-right" style={{ color: C.faint }}>
                      {i + 1}:
                    </span>
                    <button
                      onClick={() => setNextUp(id)}
                      className="font-semibold flex-1 text-left"
                      style={{ opacity: here ? 1 : 0.4, textDecoration: here ? "none" : "line-through" }}
                    >
                      {nameOf(id)}
                      {tag === "UP" && (
                        <span className="font-mono text-xs ml-2 px-2 py-0.5 rounded font-bold" style={{ background: C.gold }}>
                          UP
                        </span>
                      )}
                    </button>
                    <button onClick={() => moveBat(i, -1)} disabled={i === 0} className="font-mono px-2 py-1 rounded" style={{ border: `1px solid ${C.line}`, color: C.faint, opacity: i === 0 ? 0.3 : 1 }}>
                      ↑
                    </button>
                    <button onClick={() => moveBat(i, 1)} disabled={i === draft.batting.length - 1} className="font-mono px-2 py-1 rounded" style={{ border: `1px solid ${C.line}`, color: C.faint, opacity: i === draft.batting.length - 1 ? 0.3 : 1 }}>
                      ↓
                    </button>
                  </div>
                );
              })}
            </div>
          </div>

          {/* inning selector */}
          <div className="grid grid-cols-6 gap-1">
            {[0, 1, 2, 3, 4, 5].map((i) => (
              <button
                key={i}
                onClick={() => {
                  setCurInning(i);
                  setSel(null);
                }}
                className="py-3 rounded font-mono font-bold"
                style={
                  curInning === i
                    ? { background: C.green, color: "#fff" }
                    : { background: C.card, color: C.faint, border: `1px solid ${C.line}` }
                }
              >
                {i + 1}
              </button>
            ))}
          </div>

          {/* the card */}
          <div className="rounded overflow-hidden" style={{ background: C.card, border: `1px solid ${C.line}` }}>
            <div className="px-4 py-2 font-mono text-xs tracking-widest flex justify-between" style={{ background: C.benchBg, color: C.faint }}>
              <span>INNING {curInning + 1}</span>
              <span>{sel ? "TAP A SECOND KID TO SWAP" : "TAP TWO KIDS TO SWAP"}</span>
            </div>
            {inningPositions(curInning).map((p) => {
              const id = draft.innings[curInning][p];
              const selected = sel && sel.id === id && sel.pos === p;
              const pinned = (draft.pins[curInning] || {})[p] === id;
              return (
                <div
                  key={p}
                  className="w-full flex items-center gap-3 px-4 py-3"
                  style={{
                    borderTop: `1px solid ${C.line}`,
                    background: selected ? C.goldSoft : "transparent",
                  }}
                >
                  <button onClick={() => tapRow(id, p)} className="flex items-center gap-3 flex-1 text-left">
                    <span
                      className="font-mono font-bold text-sm w-10 text-center py-1 rounded"
                      style={{
                        background: OF.has(p) ? C.benchBg : C.green,
                        color: OF.has(p) ? C.ink : "#fff",
                      }}
                    >
                      {p}
                    </span>
                    <span className="text-xl font-bold">{nameOf(id)}</span>
                  </button>
                  <button
                    onClick={() => togglePin(p, id)}
                    className="font-mono text-xs px-2 py-1 rounded"
                    style={{
                      background: pinned ? C.gold : "transparent",
                      border: `1px solid ${pinned ? C.gold : C.line}`,
                      color: pinned ? C.ink : C.faint,
                    }}
                  >
                    {pinned ? "PINNED" : "pin"}
                  </button>
                </div>
              );
            })}
            {benchFor(curInning).length > 0 && (
              <div style={{ borderTop: `2px solid ${C.line}`, background: C.benchBg }} className="px-4 py-3">
                <div className="font-mono text-xs tracking-widest mb-1" style={{ color: C.faint }}>
                  BENCH
                </div>
                <div className="flex flex-wrap gap-2">
                  {benchFor(curInning).map((id) => {
                    const selected = sel && sel.id === id && !sel.pos;
                    const nth = sitsSoFar(id, curInning);
                    return (
                      <button
                        key={id}
                        onClick={() => tapRow(id, null)}
                        className="px-3 py-2 rounded font-semibold text-sm"
                        style={{
                          background: selected ? C.goldSoft : C.card,
                          border: `1px solid ${selected ? C.gold : C.line}`,
                        }}
                      >
                        {nameOf(id)}
                        {nth >= 2 && (
                          <span className="font-mono text-xs ml-1" style={{ color: C.out }}>
                            ×{nth}
                          </span>
                        )}
                      </button>
                    );
                  })}
                </div>
              </div>
            )}
          </div>

          {/* manage players — god mode */}
          <Btn kind="ghost" onClick={() => setManaging(!managing)}>
            {managing ? "Close Manage Players" : `Manage Players (inning ${curInning + 1} on)`}
          </Btn>
          {managing && (
            <div className="rounded p-3 flex flex-col gap-2" style={{ background: C.card, border: `1px solid ${C.line}` }}>
              <div className="font-mono text-xs leading-5" style={{ color: C.faint }}>
                Toggles apply from inning {curInning + 1} through 6. Innings before that stay exactly as played. Remaining innings rebuild instantly. Late arrival? Toggle them IN, then set their batting spot with the arrows.
              </div>
              {roster.map((r) => {
                const isIn = (draft.availByInning[curInning] || []).includes(r.id);
                return (
                  <button
                    key={r.id}
                    onClick={() => toggleAvail(r.id)}
                    className="flex items-center justify-between px-4 py-3 rounded text-left"
                    style={{
                      background: isIn ? C.card : "#F6E4DF",
                      border: `1px solid ${isIn ? C.line : C.out}`,
                      color: isIn ? C.ink : C.out,
                    }}
                  >
                    <span className="font-semibold" style={{ textDecoration: isIn ? "none" : "line-through" }}>
                      {r.name}
                    </span>
                    <span className="font-mono text-xs">{isIn ? "IN" : "OUT"}</span>
                  </button>
                );
              })}
            </div>
          )}

          <Btn kind="ghost" onClick={reshuffle}>
            Reshuffle innings {curInning + 1}–6
          </Btn>
          <button onClick={editAttendance} className="font-mono text-xs py-1" style={{ color: C.faint }}>
            Rebuild whole game from scratch (pre-game only — wipes swaps & batting edits)
          </button>
        </div>
      )}

      {/* ============ ROSTER ============ */}
      {view === "roster" && (
        <div className="px-4 pt-4 flex flex-col gap-3">
          {roster.map((r) => (
            <div
              key={r.id}
              className="flex items-center rounded overflow-hidden"
              style={{ background: C.card, border: `1px solid ${C.line}` }}
            >
              <input
                value={r.name}
                onChange={(e) => renameKid(r.id, e.target.value)}
                className="flex-1 px-4 py-3 font-semibold bg-transparent outline-none"
                style={{ color: C.ink }}
              />
              <button
                onClick={() =>
                  armDelete === r.id ? removeKid(r.id) : setArmDelete(r.id)
                }
                className="px-4 py-3 font-mono text-xs"
                style={{
                  color: armDelete === r.id ? "#fff" : C.out,
                  background: armDelete === r.id ? C.out : "transparent",
                }}
              >
                {armDelete === r.id ? "sure?" : "✕"}
              </button>
            </div>
          ))}
          <div className="rounded p-3" style={{ background: C.card, border: `1px solid ${C.line}` }}>
            <div className="font-mono text-xs tracking-widest mb-2" style={{ color: C.faint }}>
              ADD PLAYERS — ONE NAME PER LINE
            </div>
            <textarea
              value={bulk}
              onChange={(e) => setBulk(e.target.value)}
              rows={roster.length ? 2 : 8}
              placeholder={"Theo\nMason\nCarter\n…"}
              className="w-full p-2 rounded text-sm outline-none"
              style={{ background: C.bg, border: `1px solid ${C.line}`, color: C.ink }}
            />
            <div className="mt-2">
              <Btn onClick={addBulk} disabled={!bulk.trim()}>
                Add to roster
              </Btn>
            </div>
          </div>
          <div className="font-mono text-xs px-1" style={{ color: C.faint }}>
            {roster.length} on roster
          </div>
        </div>
      )}

      {/* ============ SEASON ============ */}
      {view === "stats" && (
        <div className="px-4 pt-4 flex flex-col gap-2">
          {games.length === 0 && (
            <div className="text-sm py-6 text-center" style={{ color: C.faint }}>
              Play a game and season totals show up here.
            </div>
          )}
          {games.length > 0 && (
            <React.Fragment>
              <div className="grid gap-2 font-mono text-xs px-4" style={{ gridTemplateColumns: "1fr 2rem 2rem 2rem 2rem 2rem", color: C.faint }}>
                <span>PLAYER</span>
                <span className="text-right">GP</span>
                <span className="text-right">SIT</span>
                <span className="text-right">×2</span>
                <span className="text-right">IF</span>
                <span className="text-right">OF</span>
              </div>
              {roster.map((r) => {
                const st = stats[r.id] || { gp: 0, sits: 0, dbl: 0, inf: 0, of: 0, pos: {} };
                const open = expanded === r.id;
                return (
                  <div key={r.id} className="rounded" style={{ background: C.card, border: `1px solid ${C.line}` }}>
                    <button
                      onClick={() => setExpanded(open ? null : r.id)}
                      className="w-full grid gap-2 items-center px-4 py-3 text-left"
                      style={{ gridTemplateColumns: "1fr 2rem 2rem 2rem 2rem 2rem" }}
                    >
                      <span className="font-semibold text-sm truncate">{r.name}</span>
                      <span className="font-mono text-sm text-right">{st.gp}</span>
                      <span className="font-mono text-sm text-right">{st.sits}</span>
                      <span className="font-mono text-sm text-right" style={{ color: st.dbl ? C.out : C.faint }}>{st.dbl}</span>
                      <span className="font-mono text-sm text-right">{st.inf}</span>
                      <span className="font-mono text-sm text-right">{st.of}</span>
                    </button>
                    {open && (
                      <div className="px-4 pb-3 flex flex-wrap gap-1">
                        {DISPLAY_ORDER.map((p) => (
                          <span
                            key={p}
                            className="font-mono text-xs px-2 py-1 rounded"
                            style={{
                              background: (st.pos[p] || 0) > 0 ? C.benchBg : "transparent",
                              border: `1px solid ${C.line}`,
                              color: (st.pos[p] || 0) > 0 ? C.ink : C.faint,
                            }}
                          >
                            {p} {st.pos[p] || 0}
                          </span>
                        ))}
                      </div>
                    )}
                  </div>
                );
              })}
              <div className="font-mono text-xs px-1 pt-1 leading-5" style={{ color: C.faint }}>
                GP games · SIT bench innings · ×2 games with a double sit · IF/OF innings played
              </div>
              <div className="flex flex-col gap-2 pt-3">
                <Btn kind="ghost" onClick={exportData}>Export season backup</Btn>
                <label
                  className="px-4 py-3 rounded font-semibold text-sm w-full text-center cursor-pointer"
                  style={{ background: "transparent", color: C.green, border: `1.5px solid ${C.green}` }}
                >
                  Restore from backup
                  <input type="file" accept=".json,application/json" className="hidden" onChange={importData} />
                </label>
                {restoreMsg && (
                  <div className="font-mono text-xs text-center" style={{ color: C.faint }}>{restoreMsg}</div>
                )}
                <div className="font-mono text-xs px-1 leading-5" style={{ color: C.faint }}>
                  Data lives in this browser only. Export a backup after each game — restore it if the phone ever clears Safari data or you switch devices.
                </div>
              </div>
            </React.Fragment>
          )}
        </div>
      )}
      </div>
    </React.Fragment>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<RockhoundsLineup />);
</script>
</body>
</html>
